<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>글쓰기 클럽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3D5A3E">
<style>
  body { margin: 0; background: #F7F5F0; font-family: -apple-system, sans-serif; color: #333; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
  * { box-sizing: border-box; }
  .app { max-width: 420px; margin: auto; background: #F7F5F0; min-height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }
  .hidden { display: none !important; }
  
  /* 입장 화면 */
  #loginView { justify-content: center; padding: 40px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; }
  .welcome-msg h2 { color: #3D5A3E; font-size: 28px; margin-bottom: 10px; cursor: pointer; user-select: none; }
  .welcome-msg p { font-size: 15px; color: #777; line-height: 1.6; margin-bottom: 40px; }
  .input-group { animation: slideUp 0.5s ease-out; }
  input, textarea { width: 100%; padding: 18px; border: 1px solid #EAE8E3; border-radius: 12px; font-size: 16px; outline: none; background: white; margin-bottom: 12px; }
  input:focus, textarea:focus { border-color: #3D5A3E; }
  .btn-next { width: 100%; background: #3D5A3E; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
  .btn-back { background: none; border: none; color: #999; margin-top: 20px; font-size: 14px; text-decoration: underline; cursor: pointer; }

  /* 메인 UI */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px; }
  .header-title h1 { margin: 0; font-size: 20px; color: #222; cursor: pointer; user-select: none; }
  .profile-circle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #3D5A3E; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #3D5A3E; font-weight: bold; cursor: pointer; background: white; }
  .tab-nav { display: flex; border-bottom: 1px solid #E5E5E5; padding: 0; margin: 0 10px; }
  .tab-btn { flex: 1; background: none; border: none; padding: 12px 0; font-size: 14px; color: #999; border-bottom: 2px solid transparent; outline: none; }
  .tab-btn.active { color: #3D5A3E; font-weight: bold; border-bottom: 2px solid #3D5A3E; }
  .content { padding: 20px; flex: 1; overflow-y: auto; }

  .keyword-card { background: #E8F0E9; border: 1px solid #C5D8C6; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .keyword-label { font-size: 12px; color: #3D5A3E; font-weight: bold; margin-bottom: 4px; }
  .keyword-text { font-size: 22px; color: #222; font-weight: bold; margin: 0; }
  .list-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #EAE8E3; }
  .item-profile { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-right: 12px; color: white; background: #3D5A3E; }
  .badge { font-size: 11px; padding: 4px 8px; border-radius: 12px; border: 1px solid #CCC; color: #888; }
  .badge.done { border-color: #3D5A3E; color: #3D5A3E; background: #E8F0E9; }

  .feed-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #EAE8E3; }
  .feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .feed-text { font-size: 16px; line-height: 1.7; white-space: pre-wrap; }
  .action-btns { display: flex; gap: 8px; }
  .btn-sm { border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
  .btn-edit { background: #E8F0E9; color: #3D5A3E; }
  .btn-del { background: #FFEDED; color: #FF4D4D; }
  
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: white; padding: 24px; border-radius: 16px; width: 85%; max-width: 320px; }

  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="loginView">
  <div class="welcome-msg">
    <h2 id="clubTitle" onclick="triggerAdmin()">Essay Club</h2>
    <p id="loginGuide">반가워요!<br>당신의 문장이 시작되는 곳입니다.</p>
  </div>
  <div id="step1" class="input-group">
    <p style="font-size: 14px; color: #3D5A3E; margin-bottom: 15px; font-weight: bold;">본인 확인을 위해<br>휴대폰 번호를 알려주시겠어요?</p>
    <input id="phoneInput" type="tel" placeholder="번호만 입력 (- 제외)">
    <button onclick="goStep2()" class="btn-next">다음으로</button>
  </div>
  <div id="step2" class="input-group hidden">
    <p style="font-size: 14px; color: #3D5A3E; margin-bottom: 15px; font-weight: bold;">클럽에서 사용하실<br>닉네임을 적어주세요.</p>
    <input id="nameInput" placeholder="닉네임 입력">
    <button onclick="finalLogin()" class="btn-next">클럽 입장하기</button>
    <button onclick="goStep1()" class="btn-back">번호 다시 입력하기</button>
  </div>
  <div id="masterStep" class="input-group hidden">
    <p style="font-size: 14px; color: #D35400; margin-bottom: 15px; font-weight: bold;">관리자 전용 입구입니다.<br>마스터 코드를 입력해 주세요.</p>
    <input id="masterCodeInput" type="password" placeholder="Master Code">
    <button onclick="masterLogin()" class="btn-next" style="background:#D35400;">마스터 입장</button>
    <button onclick="goStep1()" class="btn-back">일반 입장으로 돌아가기</button>
  </div>
</div>

<div id="profileModal" class="modal-overlay hidden">
  <div class="modal">
    <h3 style="margin:0 0 15px; font-size:18px;">닉네임 변경</h3>
    <input id="editNameInput" placeholder="새 닉네임">
    <div style="display:flex; gap:8px;">
      <button onclick="updateNickname()" style="flex:1; padding:12px; background:#3D5A3E; color:white; border:none; border-radius:8px; font-weight:bold;">변경완료</button>
      <button onclick="toggleModal('profileModal', false)" style="flex:1; padding:12px; background:#F0F0F0; color:#666; border:none; border-radius:8px;">취소</button>
    </div>
  </div>
</div>

<div id="editPostModal" class="modal-overlay hidden">
  <div class="modal" style="max-width: 360px;">
    <h3 style="margin:0 0 15px; font-size:18px;">에세이 수정</h3>
    <textarea id="editPostText" style="min-height:200px; font-size:14px; margin-bottom:15px;"></textarea>
    <div style="display:flex; gap:8px;">
      <button id="saveEditBtn" style="flex:1; padding:12px; background:#3D5A3E; color:white; border:none; border-radius:8px; font-weight:bold;">수정완료</button>
      <button onclick="toggleModal('editPostModal', false)" style="flex:1; padding:12px; background:#F0F0F0; color:#666; border:none; border-radius:8px;">취소</button>
    </div>
  </div>
</div>

<div class="app hidden" id="mainView">
  <div class="header">
    <div class="header-title"><h1 onclick="triggerQuickSwitch()">글쓰기 클럽</h1><p id="adminIndicator" style="font-size: 10px; color: #D35400; margin: 0;"></p></div>
    <div class="profile-circle" id="myCircle" onclick="toggleModal('profileModal', true)">?</div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">오늘</button>
    <button class="tab-btn" id="btn-write" onclick="switchTab('write')">쓰기</button>
    <button class="tab-btn" id="btn-feed" onclick="switchTab('feed')">피드</button>
    <button class="tab-btn" id="btn-member" onclick="switchTab('member')">멤버</button>
  </div>
  <div class="content" id="tab-today">
    <div class="keyword-card"><div class="keyword-label">오늘의 글감</div><h2 class="keyword-text" id="dispKeyword">로딩 중...</h2></div>
    <div id="adminBox" class="hidden" style="background:#FDEBD0; padding:16px; border-radius:12px; margin-bottom:20px; border: 1px solid #F5CBA7;">
      <input id="keywordInput" placeholder="새로운 글감 입력">
      <button onclick="saveKeyword()" style="width:100%; padding:15px; background:#D35400; color:white; border:none; border-radius:8px; font-weight:bold;">글감 확정 및 배달</button>
    </div>
    <div id="statusList"></div>
  </div>
  <div class="content hidden" id="tab-write">
    <textarea id="mainText" style="min-height:350px;" placeholder="글감에 대한 생각을 적어보세요..."></textarea>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span id="saveStatus" style="font-size:12px; color:#999;">자동 임시저장 중</span>
      <label style="font-size:13px;"><input type="checkbox" id="isPvt"> 나만 보기</label>
    </div>
    <button onclick="submitPost()" style="width:100%; background:#3D5A3E; color:white; border:none; padding:18px; border-radius:12px; font-size:16px; font-weight:bold; margin-top:20px;">에세이 제출하기</button>
  </div>
  <div id="tab-feed" class="content hidden"><div id="feedList"></div></div>
  <div id="tab-member" class="content hidden"><div id="memberList"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, doc, deleteDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNtJ_BkroRRyq2d2dFLDb4gjumzRX85mk",
  authDomain: "essay-club.firebaseapp.com",
  projectId: "essay-club",
  storageBucket: "essay-club.firebasestorage.app",
  messagingSenderId: "282430977646",
  appId: "1:282430977646:web:8a1139948bb7f1b286587f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let myId = localStorage.getItem("essay_uid");
let isAdmin = localStorage.getItem("essay_role") === "admin";
let userMap = {};
let adminClickCount = 0;
let switchCount = 0;

window.triggerQuickSwitch = () => {
  if(++switchCount >= 5) {
    if(isAdmin) {
      const prevId = localStorage.getItem("prev_user_uid");
      if(prevId && confirm("규원님 계정으로 다시 전환할까요?")) {
        localStorage.setItem("essay_uid", prevId);
        localStorage.removeItem("essay_role");
        location.reload();
      } else if(!prevId && confirm("관리자 로그를 종료하고 입장 화면으로 갈까요?")) {
        localStorage.clear(); location.reload();
      }
    } else {
      if(confirm("관리자 로그인을 위해 마스터 코드를 입력하시겠습니까?")) {
        localStorage.setItem("prev_user_uid", myId);
        document.getElementById('mainView').classList.add('hidden');
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('masterStep').classList.remove('hidden');
      }
    }
    switchCount = 0;
  }
}

window.triggerAdmin = () => { if(++adminClickCount >= 5) { document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.add('hidden'); document.getElementById('masterStep').classList.remove('hidden'); } }

window.masterLogin = async () => {
  if(document.getElementById('masterCodeInput').value !== "0519") return alert("코드가 틀렸습니다.");
  await setDoc(doc(db, "profiles", "master_admin"), { nickname: "Master" }, { merge: true });
  localStorage.setItem("essay_uid", "master_admin"); 
  localStorage.setItem("essay_role", "admin"); 
  location.reload();
}

window.goStep1 = () => { document.getElementById('masterStep').classList.add('hidden'); document.getElementById('step2').classList.add('hidden'); document.getElementById('step1').classList.remove('hidden'); }
window.goStep2 = () => { if(document.getElementById('phoneInput').value.trim()) { document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); } }
window.finalLogin = async () => {
  const p = document.getElementById('phoneInput').value.trim();
  const n = document.getElementById('nameInput').value.trim();
  if(!n) return alert("닉네임을 적어주세요.");
  await setDoc(doc(db, "profiles", p), { nickname: n, joinedAt: serverTimestamp() }, { merge: true });
  localStorage.setItem("essay_uid", p); location.reload();
}
window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);
window.updateNickname = async () => {
  const n = document.getElementById('editNameInput').value.trim();
  if(n) { await setDoc(doc(db, "profiles", myId), { nickname: n }, { merge: true }); toggleModal('profileModal', false); }
}

function initData() {
  const today = new Date().toLocaleDateString();
  onSnapshot(collection(db, "profiles"), (pSnap) => {
    userMap = {}; pSnap.forEach(d => { userMap[d.id] = d.data().nickname; });
    if(myId && userMap[myId]) {
      document.getElementById('myCircle').textContent = userMap[myId][0];
      document.getElementById('editNameInput').value = userMap[myId];
    }
    onSnapshot(collection(db, "posts"), (postSnap) => {
      const doneIds = new Set(); const counts = {};
      postSnap.forEach(s => {
        const d = s.data(); if(d.uid) { counts[d.uid] = (counts[d.uid] || 0) + 1; if(d.createdAt && new Date(d.createdAt.toDate()).toLocaleDateString() === today) doneIds.add(d.uid); }
      });
      const render = (elId, isM) => {
        const el = document.getElementById(elId); if(!el) return; el.innerHTML = "";
        Object.keys(userMap).forEach(id => {
          if(id === "master_admin") return; 
          const n = userMap[id]; const isMe = (id === myId);
          el.innerHTML += `<div class="list-item"><div class="item-profile">${n[0]}</div><div class="item-info"><b>${n}${isMe?' (나)':''}</b>${isM?`<div style='font-size:11px;color:#999;'>에세이 ${counts[id]||0}편</div>`:''}</div>${!isM?`<div class="badge ${doneIds.has(id)?'done':''}">${doneIds.has(id)?'제출':'미제출'}</div>`:''}</div>`;
        });
      };
      render('statusList', false); render('memberList', true);
    });
  });
}

onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
  const feed = document.getElementById('feedList'); feed.innerHTML = "";
  snap.forEach(s => {
    const d = s.data(); if(d.isPrivate && d.uid !== myId && !isAdmin) return;
    const n = userMap[d.uid] || "멤버"; const isMyPost = d.uid === myId;
    const div = document.createElement('div'); div.className = "feed-item";
    div.innerHTML = `<div class="feed-header"><div style="display:flex;align-items:center;"><div class="item-profile" style="width:24px;height:24px;font-size:10px;">${n[0]}</div><span style="font-weight:bold;margin:0 8px;font-size:14px;">${n} ${d.isPrivate?'🔒':''}</span></div><div class="action-btns">${isMyPost ? `<button class="btn-sm btn-edit" onclick="openEditModal('${s.id}', \`${d.text.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)">수정</button>` : ''}${isMyPost || isAdmin ? `<button class="btn-sm btn-del" onclick="deletePost('${s.id}')">삭제</button>` : ''}</div></div><div class="feed-text">${d.text}</div>`;
    feed.appendChild(div);
  });
});

window.openEditModal = (id, text) => {
  document.getElementById('editPostText').value = text;
  document.getElementById('saveEditBtn').onclick = async () => {
    const newText = document.getElementById('editPostText').value.trim();
    if(newText) { await updateDoc(doc(db, "posts", id), { text: newText }); toggleModal('editPostModal', false); }
  };
  toggleModal('editPostModal', true);
}

// 👏 축하 애니메이션 함수
function showCelebration() {
  const emojis = ['👏', '✨', '✍️', '💛', '🎉'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.position = 'fixed'; el.style.left = '50%'; el.style.top = '50%';
    el.style.fontSize = '24px'; el.style.zIndex = '9999'; el.style.pointerEvents = 'none';
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 150;
    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist;
    document.body.appendChild(el);
    const anim = el.animate([
      { transform: 'translate(-50%, -50%) scale(0)', opacity: 1 },
      { transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1.5)`, opacity: 0 }
    ], { duration: 1200 + Math.random() * 500, easing: 'ease-out' });
    anim.onfinish = () => el.remove();
  }
}

window.submitPost = async () => {
  const t = document.getElementById('mainText').value.trim(); if(!t) return;
  try {
    await addDoc(collection(db, "posts"), { uid: myId, text: t, isPrivate: document.getElementById('isPvt').checked, createdAt: serverTimestamp() });
    showCelebration(); // 박수 애니메이션 실행
    setTimeout(() => {
      document.getElementById('mainText').value = ""; localStorage.removeItem("essay_draft"); switchTab('feed');
    }, 1200);
  } catch(e) { alert("제출에 실패했습니다."); }
}

window.deletePost = async (id) => { if(confirm("정말 삭제하시겠습니까?")) await deleteDoc(doc(db, "posts", id)); }
window.switchTab = (id) => { ['today', 'write', 'feed', 'member'].forEach(v => { document.getElementById('tab-'+v).classList.add('hidden'); document.getElementById('btn-'+v).classList.remove('active'); }); document.getElementById('tab-'+id).classList.remove('hidden'); document.getElementById('btn-'+id).classList.add('active'); }
window.saveKeyword = async () => {
  const t = document.getElementById('keywordInput').value.trim();
  if(t) { await addDoc(collection(db, "keywords"), { text: t, date: Date.now() }); document.getElementById('keywordInput').value = ""; alert("새 글감이 배달되었습니다!"); }
}
onSnapshot(query(collection(db, "keywords"), orderBy("date", "desc"), limit(1)), (snap) => { snap.forEach(d => document.getElementById('dispKeyword').textContent = d.data().text); });

if(myId) { document.getElementById('loginView').classList.add('hidden'); document.getElementById('mainView').classList.remove('hidden'); if(isAdmin) { document.getElementById('adminBox').classList.remove('hidden'); document.getElementById('adminIndicator').textContent = "● Master Mode"; } initData(); }
document.getElementById('mainText').value = localStorage.getItem("essay_draft") || "";
document.getElementById('mainText').addEventListener('input', (e) => localStorage.setItem("essay_draft", e.target.value));
</script>
</body>
</html>
