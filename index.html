<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>에세이 클럽</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
  :root { --main: #111; --bg: #FFF; --accent: #ff4d4d; }
  body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--main); overflow: hidden; height: 100vh; position: fixed; width: 100%; }
  * { box-sizing: border-box; }
  .app { max-width: 420px; margin: auto; height: 100vh; display: flex; flex-direction: column; position: relative; border-left: 1px solid #EEE; border-right: 1px solid #EEE; }
  .content { padding: 0 24px 120px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .hidden { display: none !important; }

  /* 헤더/인사말 */
  .header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 800; text-decoration: underline; cursor: pointer; margin: 0; }
  .welcome-section { padding: 40px 0 20px; border-bottom: 2px solid var(--main); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
  .welcome-msg { font-size: 24px; font-weight: 400; line-height: 1.4; margin: 0; }

  /* 마스터 UI */
  .keyword-card { border: 2.5px solid var(--main); border-radius: 24px; padding: 30px; margin-bottom: 35px; box-shadow: 8px 8px 0px var(--main); position: relative; }
  .master-box { margin-top: 20px; padding: 20px; border: 2px solid var(--accent); border-radius: 20px; background: #FFF; }
  .master-input { width: 100%; padding: 12px; border: 2px solid #EEE; border-radius: 12px; margin-bottom: 8px; font-size: 14px; outline: none; }
  .reserved-list { margin-top: 15px; border-top: 1px solid #EEE; padding-top: 10px; max-height: 150px; overflow-y: auto; font-size: 12px; }

  /* 피드 필터/태그 */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
  .filter-select, .filter-date { padding: 8px 12px; border: 2px solid var(--main); border-radius: 12px; font-size: 13px; font-weight: 600; outline: none; background: #FFF; }
  .keyword-tag { display: inline-block; background: #f0f0f0; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-bottom: 12px; border: 1px solid #DDD; }
  
  .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .status-item { border: 2px solid var(--main); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 10px; background: white; }
  .mini-profile { width: 32px; height: 32px; border-radius: 50%; background: var(--main); color: #FFF; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }
  .badge { font-size: 9px; border: 1px solid #111; padding: 2px 6px; border-radius: 6px; margin-top: 4px; display: inline-block; }
  
  /* 피드 카드 */
  .feed-card { border: 2px solid #111; border-radius: 20px; padding: 20px; margin-bottom: 15px; background: #FFF; position: relative; }
  .feed-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .feed-time { font-size: 11px; color: #999; font-weight: 600; }
  .action-btn { cursor: pointer; text-decoration: underline; color: #666; font-size: 11px; margin-left: 8px; }

  /* 네비게이션 */
  .tab-nav { display: flex; background: #FFF; border-top: 2px solid var(--main); padding: 16px 16px calc(25px + env(safe-area-inset-bottom)); position: absolute; bottom: 0; width: 100%; gap: 10px; z-index: 1000; }
  .tab-btn { flex: 1; border: 2px solid var(--main); padding: 14px 0; background: #FFF; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .tab-btn.active { background: var(--main); color: #FFF; }

  /* 📍 비밀글 위치 수정: 입력창 우측 하단 정렬 */
  .private-wrap { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin: 10px 0 20px; font-weight: 500; font-size: 13px; color: #666; cursor: pointer; }
  
  /* 모달 오버레이 */
  .modal-overlay { position: fixed; inset: 0; background: #FFF; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .modal { width: 100%; max-width: 380px; padding: 40px 24px; text-align: center; }

  .btn-next { width: 100%; padding: 20px; background: var(--main); color: #FFF; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; }
  #charCount { text-align: right; font-size: 12px; color: #999; font-weight: 600; margin-bottom: 4px; }
  input, textarea { width: 100%; padding: 18px; border: 2px solid var(--main); border-radius: 16px; font-size: 16px; outline: none; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="app">
  <div id="mainUI" class="hidden" style="display:flex; flex-direction:column; height:100%;">
    <div class="header">
      <h1 id="mainTitle">에세이 클럽</h1>
      <div id="myCircle" class="mini-profile" onclick="toggleModal('editProfileModal', true)" style="cursor:pointer;">?</div>
    </div>

    <div class="content" id="tab-today">
      <div class="welcome-section">
        <h2 class="welcome-msg" id="dynamicWelcome">연결 중...</h2>
        <img src="mole.png" alt="" style="width:80px;" onerror="this.style.display='none'">
      </div>
      <div class="keyword-card">
        <small style="font-weight:800;">오늘의 글감</small>
        <h2 id="dispKeyword" style="margin:12px 0 0; font-size:24px; font-weight:800;">...</h2>
        <div id="adminPanel" class="master-box hidden">
          <h4 style="margin:0 0 12px; font-size:14px; color:var(--accent);">🚨 마스터: 글감 창고</h4>
          <div style="display:flex; gap:5px; margin-bottom:8px;">
            <input id="newKw" class="master-input" type="text" placeholder="글감" style="margin:0;">
            <input id="kwDate" class="master-input" type="date" style="margin:0; flex:1.2;">
          </div>
          <button onclick="saveKeyword()" style="width:100%; padding:12px; background:var(--accent); color:#FFF; border:none; border-radius:12px; font-weight:800; cursor:pointer;">예약 저장</button>
          <div id="reservedListUI" class="reserved-list"></div>
        </div>
      </div>
      <div id="statusList" class="status-grid"></div>
    </div>

    <div class="content hidden" id="tab-write">
      <div style="padding-top:40px;">
        <div style="background:#f9f9f9; border:2px solid #111; border-radius:16px; padding:15px; margin-bottom:20px; font-size:14px;">
          <b>💡 오늘의 글감:</b> <span id="writeTabKeyword">...</span>
        </div>
        <h2 style="font-weight:800; margin-bottom:5px;">에세이 쓰기</h2>
        <input id="postTitle" type="text" placeholder="제목 (선택)" style="font-weight:700;">
        <div id="charCount">0 / 1,000자</div>
        <textarea id="postText" style="height:250px;" placeholder="생각을 적어보세요."></textarea>
        
        <!-- 📍 비밀글 위치 수정 반영 -->
        <label class="private-wrap"><input type="checkbox" id="isPrivate"> <span>비밀글로 업로드</span></label>
        
        <button id="submitBtn" onclick="submitPost()" class="btn-next" style="opacity:0.3;" disabled>제출하기</button>
      </div>
    </div>

    <div class="content hidden" id="tab-feed">
      <div style="padding-top:40px;">
        <h2 style="font-weight:800; margin-bottom:15px;">모두의 피드</h2>
        <div class="filter-bar">
          <select id="filterMember" class="filter-select" onchange="renderFeed()"></select>
          <input id="filterDate" type="date" class="filter-date" onchange="renderFeed()">
          <button onclick="resetFilter()" style="background:none; border:none; text-decoration:underline; font-size:12px; color:#999; cursor:pointer;">초기화</button>
        </div>
        <div id="feedList"></div>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">오늘</button>
      <button class="tab-btn" id="btn-write" onclick="switchTab('write')">쓰기</button>
      <button class="tab-btn" id="btn-feed" onclick="switchTab('feed')">피드</button>
    </div>
  </div>

  <!-- 가입 모달 -->
  <div id="authModal" class="modal-overlay hidden">
    <div class="modal">
      <h2 style="font-size:28px; font-weight:800; margin-bottom:20px;">Essay Club</h2>
      <div id="authStep1">
        <input id="phoneInput" type="tel" placeholder="휴대폰 번호 (- 제외 숫자만)">
        <button onclick="checkUser()" class="btn-next">시작하기</button>
      </div>
      <div id="authStep2" class="hidden">
        <input id="nickInput" placeholder="사용하실 닉네임 입력">
        <button onclick="finishJoin()" class="btn-next">클럽 입장하기</button>
      </div>
    </div>
  </div>

  <div id="editProfileModal" class="modal-overlay hidden" style="background:rgba(0,0,0,0.5); z-index:10001;">
    <div class="modal" style="background:#FFF; border-radius:24px; padding:30px;">
      <h3 style="font-weight:800; margin-bottom:15px;">닉네임 수정</h3>
      <input id="editNickInput">
      <button onclick="updateProfile()" class="btn-next">저장하기</button>
      <button onclick="toggleModal('editProfileModal', false)" style="background:none; border:none; margin-top:15px; color:#999; cursor:pointer;">닫기</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where, orderBy, limit, doc, setDoc, getDoc, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyBNtJ_BkroRRyq2d2dFLDb4gjumzRX85mk", authDomain: "essay-club.firebaseapp.com", projectId: "essay-club", storageBucket: "essay-club.firebasestorage.app", messagingSenderId: "282430977646", appId: "1:282430977646:web:8a1139948bb7f1b286587f" };
const app = initializeApp(firebaseConfig); const db = getFirestore(app);

// 📍 마스터님이 가입할 때 사용한 실제 휴대폰 번호를 아래에 적어주세요
const MY_REAL_PHONE = "01012345678"; 

let myId = localStorage.getItem("essay_uid");
let allPosts = []; let userMap = {};

const dayOfWeek = new Date().getDay();
const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

window.onload = () => { 
    if(!myId) {
        document.getElementById('mainUI').classList.add('hidden');
        document.getElementById('authModal').classList.remove('hidden');
    } else {
        document.getElementById('mainUI').classList.remove('hidden');
        document.getElementById('authModal').classList.add('hidden');
        startApp(myId); 
    }
};

window.switchTab = (id) => {
  document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.remove('hidden');
  document.getElementById('btn-'+id)?.classList.add('active');
};
window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);

const postArea = document.getElementById('postText');
postArea?.addEventListener('input', () => {
  const len = postArea.value.length;
  document.getElementById('charCount').textContent = `${len.toLocaleString()} / 1,000자`;
  document.getElementById('submitBtn').disabled = len === 0 || len > 1000;
  document.getElementById('submitBtn').style.opacity = len === 0 ? "0.3" : "1";
});

function startApp(uid) {
  if(uid === "master_admin") { document.getElementById('adminPanel').classList.remove('hidden'); loadReservedKeywords(); }

  onSnapshot(collection(db, "profiles"), (pSnap) => {
    userMap = {}; const filterSel = document.getElementById('filterMember');
    if(filterSel) filterSel.innerHTML = '<option value="all">모든 멤버</option>';
    pSnap.forEach(d => { 
      userMap[d.id] = d.data().nickname; 
      if(d.id !== "master_admin" && filterSel) filterSel.innerHTML += `<option value="${d.id}">${d.data().nickname}</option>`;
    });

    onSnapshot(collection(db, "posts"), (postSnap) => {
      const todayStr = new Date().toLocaleDateString();
      const doneIds = new Set(); allPosts = [];
      postSnap.forEach(s => { 
        const d = s.data(); 
        if(d.createdAt && new Date(d.createdAt.toDate()).toLocaleDateString() === todayStr) doneIds.add(d.uid);
        allPosts.push({ id: s.id, ...d }); 
      });

      const myName = userMap[uid] || "멤버";
      const welcomeEl = document.getElementById('dynamicWelcome');
      if (isWeekend && welcomeEl) welcomeEl.innerHTML = `<b>${myName}</b>님, 주말은 클럽도<br>쉬어갑니다. 푹 쉬세요!`;
      else if(welcomeEl) welcomeEl.innerHTML = doneIds.has(uid) ? `<b>${myName}</b>님의 생각이<br>차곡 쌓였어요` : `<b>${myName}</b>님, 오늘의 생각을<br>붙잡아 보세요!`;
      const myCircle = document.getElementById('myCircle');
      if(myCircle) myCircle.textContent = myName[0];

      const sList = document.getElementById('statusList'); if(sList) sList.innerHTML = "";
      Object.entries(userMap).forEach(([id, name]) => {
        if(id === "master_admin" || !sList) return;
        const done = doneIds.has(id);
        sList.innerHTML += `<div class="status-item"><div class="mini-profile">${name[0]}</div><div><b>${name}${id===uid?' (나)':''}</b><br><span class="badge" style="background:${done?'#111':'#FFF'}; color:${done?'#FFF':'#111'};">${done?'완료':'미제출'}</span></div></div>`;
      });
      renderFeed();
    });
  });

  const todayISO = new Date().toISOString().split('T')[0];
  const q = query(collection(db, "keywords"), where("date", "<=", todayISO), orderBy("date", "desc"), limit(1));
  onSnapshot(q, (snap) => {
    const dKw = document.getElementById('dispKeyword'); const wKw = document.getElementById('writeTabKeyword');
    if (isWeekend) { if(dKw) dKw.textContent = "주말은 쉽니다 🌿"; if(wKw) wKw.textContent = "오늘은 쉬는 날입니다."; if(postArea) postArea.disabled = true; }
    else {
      if(snap.empty && dKw) dKw.textContent = "글감을 기다려요";
      else snap.forEach(d => { if(dKw) dKw.textContent = d.data().text; if(wKw) wKw.textContent = d.data().text; });
      if(postArea) postArea.disabled = false;
    }
  });
}

window.renderFeed = () => {
  const mVal = document.getElementById('filterMember')?.value || "all";
  const dVal = document.getElementById('filterDate')?.value || "";
  const feedEl = document.getElementById('feedList');
  if(!feedEl) return;
  feedEl.innerHTML = "";

  const filtered = allPosts.filter(p => {
    const postDate = p.createdAt?.toDate().toISOString().split('T')[0];
    return (mVal === "all" || p.uid === mVal) && (!dVal || postDate === dVal);
  });

  if(filtered.length === 0) { feedEl.innerHTML = `<p style="text-align:center; color:#999; padding-top:40px;">일치하는 글이 없어요.</p>`; return; }

  filtered.sort((a,b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0)).forEach(p => {
    const name = userMap[p.uid] || "멤버"; const isMy = p.uid === myId;
    const dateObj = p.createdAt?.toDate(); 
    const timeStr = dateObj ? `${dateObj.getMonth()+1}.${dateObj.getDate()} ${dateObj.getHours()}:${dateObj.getMinutes().toString().padStart(2,'0')}` : "";
    
    feedEl.innerHTML += `
      <div class="feed-card">
        <div class="keyword-tag"># ${p.keyword || '글감'}</div>
        <div class="feed-header">
          <div style="display:flex; align-items:center; gap:8px;"><div class="mini-profile">${name[0]}</div><b>${name}</b>${p.isPrivate?' 🔒':''}</div>
          <div style="text-align:right;">
            <span class="feed-time">${timeStr}</span>
            ${isMy ? `<span class="action-btn" onclick="editPost('${p.id}', '${p.title||''}', \`${p.text.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)">수정</span><span class="action-btn" onclick="deletePost('${p.id}')">삭제</span>` : ''}
          </div>
        </div>
        ${p.title ? `<h3 style="margin:0 0 10px; font-size:18px;">${p.title}</h3>` : ''}
        <div style="white-space:pre-wrap; line-height:1.6; font-size:15px;">${(p.isPrivate && !isMy) ? '비밀글입니다. 🔒' : p.text}</div>
      </div>`;
  });
};

window.checkUser = async () => {
  const p = document.getElementById('phoneInput').value.trim();
  if(!p || p.length < 10) return alert("휴대폰 번호를 숫자만 입력해 주세요.");
  myId = p; 
  const d = await getDoc(doc(db, "profiles", p));
  if(d.exists()) { localStorage.setItem("essay_uid", p); location.reload(); } 
  else { document.getElementById('authStep1').classList.add('hidden'); document.getElementById('authStep2').classList.remove('hidden'); }
};

window.finishJoin = async () => {
  const n = document.getElementById('nickInput').value.trim();
  if(!n) return alert("닉네임을 입력해 주세요.");
  try {
    await setDoc(doc(db, "profiles", myId), { nickname: n, joinedAt: serverTimestamp() });
    localStorage.setItem("essay_uid", myId); location.reload(); 
  } catch(e) { alert("오류 발생: " + e.message); }
};

window.resetFilter = () => { document.getElementById('filterMember').value = "all"; document.getElementById('filterDate').value = ""; renderFeed(); };
window.saveKeyword = async () => {
  const t = document.getElementById('newKw').value.trim(); const d = document.getElementById('kwDate').value;
  if(t && d) { await addDoc(collection(db, "keywords"), { text: t, date: d }); document.getElementById('newKw').value = ""; alert("저장 완료"); }
};
window.deleteKeyword = async (id) => { if(confirm("삭제?")) await deleteDoc(doc(db, "keywords", id)); };

// 📍 글 제출 시 당시 글감도 함께 저장 (태그 기능)
window.submitPost = async () => {
  const title = document.getElementById('postTitle').value.trim();
  const text = postArea.value.trim();
  const isPvt = document.getElementById('isPrivate').checked;
  const kw = document.getElementById('writeTabKeyword').textContent;
  await addDoc(collection(db, "posts"), { uid: myId, title, text, isPrivate: isPvt, keyword: kw, createdAt: serverTimestamp() });
  postArea.value = ""; document.getElementById('postTitle').value = ""; switchTab('feed');
};

window.editPost = async (id, oldTitle, oldText) => {
    const newTitle = prompt("제목 수정:", oldTitle); const newText = prompt("내용 수정:", oldText);
    if (newText === null) return;
    await updateDoc(doc(db, "posts", id), { title: newTitle || "", text: newText });
};
window.deletePost = async (id) => { if(confirm("삭제?")) await deleteDoc(doc(db, "posts", id)); };
window.updateProfile = async () => {
  const n = document.getElementById('editNickInput').value.trim();
  await updateDoc(doc(db, "profiles", myId), { nickname: n }); location.reload();
};

function loadReservedKeywords() {
  const listUI = document.getElementById('reservedListUI');
  onSnapshot(query(collection(db, "keywords"), orderBy("date", "asc")), (snap) => {
    listUI.innerHTML = snap.empty ? `<p style="color:#999; text-align:center;">비어있음</p>` : `<p style="font-weight:700; margin-bottom:5px;">배송 대기</p>`;
    snap.forEach(d => {
      const data = d.data();
      listUI.innerHTML += `<div class="reserved-item" style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:11px;"><span>${data.date} <b>${data.text}</b></span><button style="color:red; border:none; background:none;" onclick="deleteKeyword('${d.id}')">삭제</button></div>`;
    });
  });
}

// 📍 스마트 계정 전환 이스터 에그 (마스터 -> 멤버 원클릭)
let cc = 0; let lt = 0;
document.getElementById('mainTitle').addEventListener('click', () => {
  const n = Date.now(); if(n-lt < 1000) cc++; else cc=1; lt=n;
  if(cc===5) { 
    if(localStorage.getItem("essay_uid") === "master_admin") {
        if(confirm("마스터 권한을 해제하고 내 계정으로 돌아갈까요?")) {
            localStorage.setItem("essay_uid", MY_REAL_PHONE); location.reload(); 
        }
    } else {
        const c = prompt("코드 또는 번호:"); 
        if(c === "0519") { localStorage.setItem("essay_uid", "master_admin"); location.reload(); }
        else if(c) { localStorage.setItem("essay_uid", c); location.reload(); }
    }
    cc = 0;
  }
});
</script>
</body>
</html>
