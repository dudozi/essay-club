<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>에세이 클럽</title>
<style>
  :root { --main: #111; --bg: #FFFFFF; --card: #FFFFFF; --text: #111; --sub: #888; }
  body { margin: 0; background: var(--bg); font-family: -apple-system, "Malgun Gothic", sans-serif; color: var(--text); overflow: hidden; height: 100vh; position: fixed; width: 100%; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  .app { max-width: 420px; margin: auto; background: var(--bg); height: 100vh; display: flex; flex-direction: column; border-left: 1px solid #EEE; border-right: 1px solid #EEE; position: relative; }
  .hidden { display: none !important; }
  
  /* 헤더 */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 25px 24px 10px; flex-shrink: 0; }
  .header h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.05em; cursor: pointer; text-decoration: underline; text-underline-offset: 4px; }
  .profile-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: bold; cursor: pointer; background: var(--main); border: 2px solid var(--main); }

  /* 하단 탭 고정 (중요!) */
  .tab-nav { display: flex; background: white; border-top: 2px solid var(--main); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); flex-shrink: 0; gap: 8px; position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000; }
  .tab-btn { flex: 1; background: white; border: 1.5px solid var(--main); padding: 12px 0; font-size: 13px; color: var(--main); border-radius: 12px; font-weight: 600; transition: 0.2s; cursor: pointer; }
  .tab-btn.active { background: var(--main); color: white; box-shadow: 4px 4px 0px #DDD; }

  /* 콘텐츠 영역: 하단 탭 높이만큼 여백 확보 */
  .content { padding: 0 24px calc(80px + env(safe-area-inset-bottom)); flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* 오늘 탭 스타일 */
  .welcome-section { display: flex; justify-content: space-between; align-items: center; padding: 40px 0 30px; border-bottom: 2px solid var(--main); margin-bottom: 35px; }
  .welcome-msg { font-size: 26px; font-weight: 400; line-height: 1.4; margin: 0; word-break: keep-all; letter-spacing: -0.04em; }
  .welcome-msg b { font-weight: 600; text-decoration: underline; text-underline-offset: 4px; }
  .mole-character { width: 85px; height: auto; flex-shrink: 0; }

  .keyword-card { background: var(--card); border: 2.5px solid var(--main); border-radius: 24px; padding: 35px 24px; margin-bottom: 40px; box-shadow: 8px 8px 0px var(--main); }
  .keyword-label { font-size: 12px; font-weight: 700; margin-bottom: 15px; display: block; }
  .keyword-text { font-size: 24px; font-weight: 700; line-height: 1.5; margin: 0; }

  .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .status-item { background: white; padding: 18px 14px; border-radius: 20px; border: 2px solid var(--main); display: flex; align-items: center; }
  .mini-profile { width: 32px; height: 32px; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; font-weight: bold; background: var(--main); }
  .badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 10px; margin-top: 5px; display: inline-block; border: 1.5px solid var(--main); }
  .badge.done { color: white; background: var(--main); }
  .badge.pending { color: var(--main); background: white; }

  /* 피드 리스트 스타일 */
  .feed-item { border: 2px solid var(--main); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 4px 4px 0px #EEE; }
  .feed-header { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }
  .feed-text { font-size: 15px; line-height: 1.6; white-space: pre-wrap; }

  /* 입력창 및 모달 */
  textarea, input { width: 100%; border: 2px solid var(--main); border-radius: 16px; padding: 18px; font-size: 16px; margin-bottom: 15px; background: white; outline: none; }
  .btn-next { width: 100%; background: var(--main); color: white; border: none; padding: 20px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; }
  .modal { background: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 340px; border: 3px solid var(--main); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1 onclick="location.reload()">에세이 클럽</h1>
    <div class="profile-circle" id="myCircle" onclick="toggleModal('profileModal', true)">?</div>
  </div>
  
  <div class="content" id="tab-today">
    <div class="welcome-section">
      <div class="welcome-text-group">
        <h2 class="welcome-msg" id="dynamicWelcome"><b>...</b>님,<br>오늘도 문장을 저어봐요!</h2>
        <p id="todayDateLabel" style="font-size:13px; color:#666; margin-top:10px; font-weight:500;"></p>
      </div>
      <img src="mole.png" alt="마스코트" class="mole-character" onerror="this.style.display='none'">
    </div>
    <div class="keyword-card">
      <span class="keyword-label">오늘의 글감</span>
      <h2 class="keyword-text" id="dispKeyword">로딩 중...</h2>
    </div>
    <div class="section-title" style="font-weight:700; margin-bottom:15px;">기록 현황</div>
    <div id="statusList" class="status-grid"></div>
  </div>

  <div class="content hidden" id="tab-write">
    <div style="padding-top:30px;">
        <h2 style="font-weight:800; margin-bottom:15px;">문장 젓기</h2>
        <div id="charCount" style="font-size:12px; color:#999; margin-bottom:10px;">0 / 1,000자 (공백 포함)</div>
        <textarea id="mainText" style="min-height:300px;" placeholder="오늘의 글감에 대한 생각을 자유롭게 적어보세요."></textarea>
        <button onclick="submitPost()" class="btn-next">에세이 제출하기</button>
    </div>
  </div>

  <div class="content hidden" id="tab-feed">
    <div style="padding-top:30px;">
        <h2 style="font-weight:800; margin-bottom:20px;">모두의 피드</h2>
        <div id="feedList"></div>
    </div>
  </div>

  <div class="content hidden" id="tab-member">
    <div style="padding-top:30px;">
        <h2 style="font-weight:800; margin-bottom:20px;">클럽 멤버</h2>
        <div id="memberList"></div>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">오늘</button>
    <button class="tab-btn" id="btn-write" onclick="switchTab('write')">쓰기</button>
    <button class="tab-btn" id="btn-feed" onclick="switchTab('feed')">피드</button>
    <button class="tab-btn" id="btn-member" onclick="switchTab('member')">멤버</button>
  </div>
</div>

<div id="profileModal" class="modal-overlay hidden">
    <div class="modal">
      <h3 style="margin:0 0 15px; font-weight:800;">프로필 수정</h3>
      <input id="editNameInput" placeholder="닉네임 입력">
      <button onclick="updateProfile()" class="btn-next">저장하기</button>
      <button onclick="toggleModal('profileModal', false)" style="width:100%; background:none; border:none; margin-top:15px; color:#999; font-size:14px;">닫기</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, limit, doc, setDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNtJ_BkroRRyq2d2dFLDb4gjumzRX85mk",
  authDomain: "essay-club.firebaseapp.com",
  projectId: "essay-club",
  storageBucket: "essay-club.firebasestorage.app",
  messagingSenderId: "282430977646",
  appId: "1:282430977646:web:8a1139948bb7f1b286587f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let myId = localStorage.getItem("essay_uid");
if(!myId) {
    myId = "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("essay_uid", myId);
}

function initData() {
  onSnapshot(collection(db, "profiles"), (pSnap) => {
    let userMap = {};
    pSnap.forEach(d => { userMap[d.id] = d.data().nickname; });

    if(userMap[myId]) {
      document.getElementById('dynamicWelcome').innerHTML = `<b>${userMap[myId]}</b>님,<br>오늘도 문장을 저어봐요!`;
      document.getElementById('myCircle').textContent = userMap[myId][0];
      document.getElementById('editNameInput').value = userMap[myId];
    }

    onSnapshot(collection(db, "posts"), (postSnap) => {
      const todayStr = new Date().toLocaleDateString();
      const doneIds = new Set();
      const allPosts = [];

      postSnap.forEach(s => {
        const d = s.data();
        if(d.createdAt && new Date(d.createdAt.toDate()).toLocaleDateString() === todayStr) doneIds.add(d.uid);
        allPosts.push({ id: s.id, ...d });
      });

      // 오늘 탭 리스트 렌더링
      const listEl = document.getElementById('statusList');
      listEl.innerHTML = "";
      Object.keys(userMap).forEach(id => {
        if(id === "master_admin") return;
        const isDone = doneIds.has(id);
        listEl.innerHTML += `<div class="status-item"><div class="mini-profile">${userMap[id][0]}</div><div class="status-info"><b>${userMap[id]}${id===myId?' (나)':''}</b><span class="badge ${isDone?'done':'pending'}">${isDone?'완료':'미완'}</span></div></div>`;
      });

      // 피드 리스트 렌더링
      const feedEl = document.getElementById('feedList');
      feedEl.innerHTML = "";
      allPosts.sort((a,b) => b.createdAt - a.createdAt).forEach(p => {
          if(p.isPrivate && p.uid !== myId) return;
          const name = userMap[p.uid] || "멤버";
          feedEl.innerHTML += `<div class="feed-item"><div class="feed-header"><div class="mini-profile">${name[0]}</div><b>${name}</b></div><div class="feed-text">${p.text}</div></div>`;
      });
    });
  });

  onSnapshot(query(collection(db, "keywords"), orderBy("date", "desc"), limit(1)), (snap) => {
    snap.forEach(d => document.getElementById('dispKeyword').textContent = d.data().text);
  });
}

window.submitPost = async () => {
  const t = document.getElementById('mainText').value.trim();
  if(!t) return alert("내용을 입력해주세요.");
  await addDoc(collection(db, "posts"), { uid: myId, text: t, isPrivate: document.getElementById('isPvt').checked, createdAt: serverTimestamp() });
  document.getElementById('mainText').value = "";
  switchTab('feed');
};

window.switchTab = (id) => {
  document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.remove('hidden');
  document.getElementById('btn-'+id).classList.add('active');
};

window.updateProfile = async () => {
  const n = document.getElementById('editNameInput').value.trim();
  if(n) { await setDoc(doc(db, "profiles", myId), { nickname: n }, { merge: true }); toggleModal('profileModal', false); }
};

window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);

document.getElementById('todayDateLabel').textContent = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
initData();

const textEl = document.getElementById('mainText');
textEl.addEventListener('input', () => { document.getElementById('charCount').textContent = `${textEl.value.length} / 1,000자
