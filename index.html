<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>에세이 클럽</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="에세이 클럽">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root { --main: #111; --bg: #FFF; --accent: #ff4d4d; }
  body { 
    margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--main); 
    height: 100svh; width: 100%; position: fixed; overflow: hidden;
  }
  * { box-sizing: border-box; }
  .app { max-width: 420px; margin: auto; height: 100svh; display: flex; flex-direction: column; position: relative; background: var(--bg); }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 24px 20px; }
  .hidden { display: none !important; }

  .header { padding: 20px 24px 10px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; font-weight: 800; text-decoration: underline; cursor: pointer; margin: 0; }

  .tab-nav { 
    display: flex; background: #FFF; border-top: 2px solid var(--main); 
    padding: 16px 16px calc(8px + env(safe-area-inset-bottom)); 
    width: 100%; gap: 10px; z-index: 1000;
  }
  .tab-btn { flex: 1; border: 2px solid var(--main); padding: 14px 0; background: #FFF; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; }
  .tab-btn.active { background: var(--main); color: #FFF; }

  .private-wrap { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin: 15px 0; font-weight: 600; font-size: 13px; color: #666; cursor: pointer; }
  .private-wrap input { width: 18px; height: 18px; margin: 0; cursor: pointer; }

  .modal-overlay { position: fixed; inset: 0; background: #FFF; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .edit-container { width: 100%; height: 100%; padding: 60px 24px; display: flex; flex-direction: column; }
  
  .btn-next { width: 100%; padding: 20px; background: var(--main); color: #FFF; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; }
  input, textarea { width: 100%; padding: 18px; border: 2px solid var(--main); border-radius: 16px; font-size: 16px; outline: none; margin-bottom: 12px; font-family: inherit; }
  .mini-profile { width: 32px; height: 32px; border-radius: 50%; background: var(--main); color: #FFF; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; cursor: pointer; }
  .feed-card { border: 2px solid #111; border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; }
  .keyword-tag { display: inline-block; background: #f0f0f0; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-bottom: 12px; border: 1px solid #DDD; }

  /* [FIX #7] 제출 로딩 상태 */
  .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }

  /* [FIX #4] 이미 제출한 경우 쓰기 탭 비활성 안내 */
  .already-submitted-banner {
    background: #f0f0f0; border: 2px solid #111; border-radius: 16px;
    padding: 20px; text-align: center; font-weight: 700; margin-top: 20px;
  }
</style>
</head>
<body>

<div class="app">
  <!-- [FIX #6] hidden 클래스 + inline style 충돌 제거: 초기에 hidden만 사용 -->
  <div id="mainUI" class="hidden" style="flex-direction:column; height:100%;">
    <div class="header">
      <h1 id="mainTitle">에세이 클럽</h1>
      <div id="myCircle" class="mini-profile">?</div>
    </div>

    <div class="content" id="tab-today">
      <div style="padding: 40px 0 20px; border-bottom: 2px solid #111; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
        <h2 id="dynamicWelcome" style="font-size: 24px; font-weight: 400; line-height: 1.4; margin: 0;">반가워요!</h2>
        <img src="mole.png" style="width:80px;" onerror="this.style.display='none'">
      </div>
      <div class="keyword-card" style="border:2.5px solid #111; border-radius:24px; padding:30px; margin-bottom:30px; box-shadow: 8px 8px 0px #111;">
        <small style="font-weight:800;">오늘의 글감</small>
        <h2 id="dispKeyword" style="margin:12px 0 0; font-size:24px; font-weight:800;">...</h2>
        <!-- [FIX #1] 어드민 패널은 서버사이드 인증 후 표시 (adminPanel 유지, JS에서 uid 검증) -->
        <div id="adminPanel" class="hidden" style="margin-top:20px; padding:15px; border:2px solid #ff4d4d; border-radius:15px;">
            <input id="newKw" placeholder="글감"><input id="kwDate" type="date">
            <button id="saveKwBtn" style="width:100%; background:#ff4d4d; color:#FFF; border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer;">저장</button>
        </div>
      </div>
      <div id="statusList" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>

    <div class="content hidden" id="tab-write">
      <div style="padding-top:20px;">
        <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:20px;">
          💡 글감: <span id="writeTabKeyword">...</span>
        </div>
        <!-- [FIX #4] 이미 제출한 경우 폼 숨김 처리 -->
        <div id="writeForm">
          <input id="postTitle" type="text" placeholder="제목">
          <textarea id="postText" style="height:300px;" placeholder="생각을 채워주세요."></textarea>
          <label class="private-wrap"><input type="checkbox" id="isPrivate"> <span>비밀글로 업로드</span></label>
          <button id="submitBtn" class="btn-next" style="opacity:0.3;" disabled>제출하기</button>
        </div>
        <div id="alreadySubmitted" class="already-submitted-banner hidden">
          ✅ 오늘의 글을 이미 제출했어요!<br><span style="font-weight:400; font-size:14px; margin-top:8px; display:block;">피드에서 확인해보세요.</span>
        </div>
      </div>
    </div>

    <div class="content hidden" id="tab-feed">
      <div style="padding-top:20px;"><h2 style="font-weight:800;">피드</h2><div id="feedList"></div></div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">오늘</button>
      <button class="tab-btn" id="btn-write" onclick="switchTab('write')">쓰기</button>
      <button class="tab-btn" id="btn-feed" onclick="switchTab('feed')">피드</button>
    </div>
  </div>

  <div id="editPostModal" class="modal-overlay hidden">
    <div class="edit-container">
      <h2 style="font-weight:800;">에세이 수정</h2>
      <input id="editPostTitle" type="text">
      <textarea id="editPostText" style="flex:1;"></textarea>
      <button id="saveEditBtn" class="btn-next">수정 완료</button>
      <button onclick="toggleModal('editPostModal', false)" style="background:none; border:none; margin-top:15px; color:#999; cursor:pointer;">취소</button>
    </div>
  </div>

  <div id="authModal" class="modal-overlay">
    <div style="text-align:center; padding: 24px;">
      <h2>Essay Club</h2>
      <input id="phoneInput" type="tel" placeholder="핸드폰 번호를 입력해 주세요">
      <button id="authBtn" class="btn-next">시작</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where, orderBy, limit, doc, setDoc, getDoc, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNtJ_BkroRRyq2d2dFLDb4gjumzRX85mk",
  authDomain: "essay-club.firebaseapp.com",
  projectId: "essay-club",
  storageBucket: "essay-club.firebasestorage.app",
  messagingSenderId: "282430977646",
  appId: "1:282430977646:web:8a1139948bb7f1b286587f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// [FIX #1,2] 어드민 코드 및 실제 전화번호를 소스에서 제거
// 어드민 전환은 Firestore profiles에 isAdmin 필드로 관리
let myId = localStorage.getItem("essay_uid");
let allPosts = [];
let userMap = {};
let currentEditId = null;
let myName = "멤버";
let todaySubmitted = false;
let postsUnsubscribe = null; // [FIX #10] 리스너 참조 저장

// [FIX #8] 요일 판단을 함수로 분리해 항상 최신 시각 기준으로 계산
function getIsWeekend() {
  const d = new Date().getDay();
  return d === 0 || d === 6;
}

// [FIX #3] XSS 방지용 이스케이프 함수
function escHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#x27;");
}

// [FIX #3] DOM API를 사용한 안전한 요소 생성 헬퍼
function el(tag, props = {}, children = []) {
  const node = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === "style") Object.assign(node.style, v);
    else if (k === "className") node.className = v;
    else if (k === "textContent") node.textContent = v;
    else node.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === "string") node.appendChild(document.createTextNode(c));
    else if (c) node.appendChild(c);
  });
  return node;
}

window.onload = () => {
  if (!myId) {
    // authModal은 기본적으로 visible (hidden 클래스 없음)
  } else {
    document.getElementById('authModal').classList.add('hidden');
    // [FIX #6] display:flex를 JS에서 명시적으로 설정
    const mainUI = document.getElementById('mainUI');
    mainUI.classList.remove('hidden');
    mainUI.style.display = 'flex';
    startApp(myId);
  }
};

window.switchTab = (id) => {
  document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.remove('hidden');
  document.getElementById('btn-' + id)?.classList.add('active');
};

window.toggleModal = (id, show) => {
  document.getElementById(id).classList.toggle('hidden', !show);
};

// [FIX #3] textarea 입력은 value로 처리하므로 XSS 없음, 길이 검증만
document.getElementById('postText')?.addEventListener('input', (e) => {
  const len = e.target.value.trim().length;
  const btn = document.getElementById('submitBtn');
  btn.disabled = len === 0;
  btn.style.opacity = len === 0 ? "0.3" : "1";
});

function getTodayStr() {
  return new Date().toLocaleDateString();
}

function startApp(uid) {
  // [FIX #1] 어드민 여부는 Firestore profiles의 isAdmin 필드로 확인
  // [FIX #10] profiles와 posts 리스너를 분리해 중첩 방지
  onSnapshot(collection(db, "profiles"), (pSnap) => {
    userMap = {};
    let isAdmin = false;
    pSnap.forEach(d => {
      userMap[d.id] = d.data().nickname;
      if (d.id === uid && d.data().isAdmin) isAdmin = true;
    });
    if (isAdmin) document.getElementById('adminPanel').classList.remove('hidden');
    myName = userMap[uid] || "멤버";
    document.getElementById('myCircle').textContent = myName[0];
    renderStatusAndWelcome();
    renderFeed();
  });

  // [FIX #10] posts 리스너를 독립적으로 분리
  if (postsUnsubscribe) postsUnsubscribe();
  postsUnsubscribe = onSnapshot(collection(db, "posts"), (postSnap) => {
    allPosts = [];
    const todayStr = getTodayStr();
    const doneIds = new Set();
    postSnap.forEach(s => {
      const d = s.data();
      if (d.createdAt && new Date(d.createdAt.toDate()).toLocaleDateString() === todayStr) {
        doneIds.add(d.uid);
      }
      allPosts.push({ id: s.id, ...d });
    });
    todaySubmitted = doneIds.has(uid);
    // [FIX #4] 오늘 이미 제출했으면 쓰기 폼 숨기기
    document.getElementById('writeForm').classList.toggle('hidden', todaySubmitted);
    document.getElementById('alreadySubmitted').classList.toggle('hidden', !todaySubmitted);
    renderStatusAndWelcome(doneIds);
    renderFeed();
  });

  const todayISO = new Date().toISOString().split('T')[0];
  onSnapshot(
    query(collection(db, "keywords"), where("date", "<=", todayISO), orderBy("date", "desc"), limit(1)),
    (snap) => {
      snap.forEach(d => {
        const text = d.data().text;
        document.getElementById('dispKeyword').textContent = text;
        document.getElementById('writeTabKeyword').textContent = text;
      });
    }
  );
}

function renderStatusAndWelcome(doneIds = new Set()) {
  // [FIX #8] 항상 최신 시각 기준으로 주말 판단
  const isWeekend = getIsWeekend();
  const welcomeEl = document.getElementById('dynamicWelcome');

  // [FIX #3] innerHTML 대신 textContent로 안전하게 처리
  welcomeEl.innerHTML = "";
  const bold = el("b", { textContent: myName });
  let rest;
  if (isWeekend) {
    rest = "님, 주말은 클럽도\n쉬어갑니다. 푹 쉬세요!";
  } else if (doneIds.has(myId)) {
    rest = "님의 생각이\n차곡 쌓였어요";
  } else {
    rest = "님, 오늘의 생각을\n붙잡아 보세요!";
  }
  welcomeEl.appendChild(bold);
  welcomeEl.appendChild(document.createTextNode(rest));

  // [FIX #3] statusList DOM API로 안전하게 렌더링
  const sList = document.getElementById('statusList');
  if (!sList) return;
  sList.innerHTML = "";
  Object.entries(userMap).forEach(([id, name]) => {
    if (id === "master_admin") return;
    const done = doneIds.has(id);
    const card = el("div", {
      style: { border: "2px solid #111", padding: "15px", borderRadius: "20px", display: "flex", alignItems: "center", gap: "10px" }
    });
    const nameEl = el("b", { textContent: name });
    const badge = el("span", {
      style: {
        fontSize: "10px", padding: "2px 5px", border: "1px solid #111",
        borderRadius: "5px",
        background: done ? "#111" : "#FFF",
        color: done ? "#FFF" : "#111"
      },
      textContent: done ? "완료" : "미제출"
    });
    card.appendChild(nameEl);
    card.appendChild(badge);
    sList.appendChild(card);
  });
}

// [FIX #3] 피드 렌더링 전체를 DOM API로 교체 (innerHTML 제거)
window.renderFeed = () => {
  const feedEl = document.getElementById('feedList');
  if (!feedEl) return;
  feedEl.innerHTML = "";

  // [FIX #11] 최신 30개만 렌더링 (간단한 페이지네이션)
  const sorted = [...allPosts].sort((a, b) =>
    (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0)
  ).slice(0, 30);

  sorted.forEach(p => {
    const name = userMap[p.uid] || "멤버";
    const isMy = p.uid === myId;
    const isPrivate = p.isPrivate && !isMy;

    const card = el("div", { className: "feed-card" });

    // keyword tag
    const tag = el("div", { className: "keyword-tag", textContent: `# ${p.keyword || "글감"}` });
    card.appendChild(tag);

    // header row: name + edit button
    const headerRow = el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "4px" } });
    headerRow.appendChild(el("b", { textContent: name }));

    if (isMy) {
      // [FIX #3] onclick 인라인 속성 제거 → addEventListener로 이벤트 등록
      const editBtn = el("span", {
        style: { textDecoration: "underline", cursor: "pointer", fontSize: "12px" },
        textContent: "수정"
      });
      editBtn.addEventListener("click", () => openEditModal(p.id, p.title || "", p.text));
      headerRow.appendChild(editBtn);
    }
    card.appendChild(headerRow);

    // title
    if (p.title) {
      card.appendChild(el("h3", { textContent: p.title, style: { margin: "8px 0" } }));
    }

    // body
    const body = el("p", {
      style: { whiteSpace: "pre-wrap", margin: "0", color: isPrivate ? "#999" : "#111" },
      textContent: isPrivate ? "비밀글입니다. 🔒" : p.text
    });
    card.appendChild(body);

    feedEl.appendChild(card);
  });

  if (sorted.length === 30 && allPosts.length > 30) {
    const more = el("div", {
      style: { textAlign: "center", padding: "16px", color: "#999", fontSize: "13px" },
      textContent: `최근 30개만 표시됩니다. (전체 ${allPosts.length}개)`
    });
    feedEl.appendChild(more);
  }
};

// [FIX #3] 수정 모달: 이벤트 인라인 속성 제거 → addEventListener
function openEditModal(id, title, text) {
  currentEditId = id;
  document.getElementById('editPostTitle').value = title;
  document.getElementById('editPostText').value = text;
  toggleModal('editPostModal', true);
}

document.getElementById('saveEditBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveEditBtn');
  btn.disabled = true;
  btn.textContent = "수정 중...";
  try {
    await updateDoc(doc(db, "posts", currentEditId), {
      title: document.getElementById('editPostTitle').value,
      text: document.getElementById('editPostText').value
    });
    toggleModal('editPostModal', false);
    alert("수정되었습니다.");
  } catch (e) {
    alert("수정에 실패했습니다. 다시 시도해주세요.");
  } finally {
    btn.disabled = false;
    btn.textContent = "수정 완료";
  }
});

// [FIX #4,7] 중복 제출 방지 + 로딩 상태 처리
document.getElementById('submitBtn').addEventListener('click', async () => {
  if (todaySubmitted) {
    alert("오늘은 이미 제출하셨습니다!");
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = "제출 중...";
  const kw = document.getElementById('writeTabKeyword').textContent;
  try {
    await addDoc(collection(db, "posts"), {
      uid: myId,
      title: document.getElementById('postTitle').value,
      text: document.getElementById('postText').value,
      isPrivate: document.getElementById('isPrivate').checked,
      keyword: kw,
      createdAt: serverTimestamp()
    });
    // [FIX #7] reload 대신 UI만 업데이트
    todaySubmitted = true;
    document.getElementById('writeForm').classList.add('hidden');
    document.getElementById('alreadySubmitted').classList.remove('hidden');
    switchTab('feed');
  } catch (e) {
    alert("제출에 실패했습니다. 다시 시도해주세요.");
    btn.disabled = false;
    btn.textContent = "제출하기";
  }
});

// 인증
document.getElementById('authBtn').addEventListener('click', async () => {
  const p = document.getElementById('phoneInput').value.trim();
  if (!p) return;
  const d = await getDoc(doc(db, "profiles", p));
  if (d.exists()) {
    localStorage.setItem("essay_uid", p);
    location.reload();
  } else {
    alert("미가입 번호입니다.");
  }
});
document.getElementById('phoneInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('authBtn').click();
});

// 프로필 아이콘
document.getElementById('myCircle').addEventListener('click', () => {
  // 필요 시 프로필 편집 모달 연결
});

// [FIX #1,2] 어드민 전환: 코드를 소스에서 제거 → isAdmin 필드로만 관리
// 타이틀 5번 탭 기능 제거 (보안상 클라이언트 어드민 전환 불필요)
// 어드민은 Firebase Console에서 직접 isAdmin: true 필드 추가로 관리

// 글감 저장 (어드민 전용)
document.getElementById('saveKwBtn').addEventListener('click', async () => {
  const text = document.getElementById('newKw').value.trim();
  const date = document.getElementById('kwDate').value;
  if (!text || !date) { alert("글감과 날짜를 입력해주세요."); return; }
  await addDoc(collection(db, "keywords"), { text, date });
  alert("저장됨");
  document.getElementById('newKw').value = "";
  document.getElementById('kwDate').value = "";
});
</script>
</body>
</html>
