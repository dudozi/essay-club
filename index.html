<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>글쓰기 클럽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3D5A3E">
<style>
  body { margin: 0; background: #F7F5F0; font-family: -apple-system, sans-serif; color: #333; -webkit-tap-highlight-color: transparent; }
  * { box-sizing: border-box; }
  .app { max-width: 420px; margin: auto; background: #F7F5F0; min-height: 100vh; display: flex; flex-direction: column; }
  .hidden { display: none !important; }
  
  /* 헤더 & 프로필 */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px; }
  .header-title h1 { margin: 0; font-size: 20px; color: #222; }
  .header-title p { margin: 4px 0 0; font-size: 12px; color: #888; }
  .profile-circle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #3D5A3E; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #3D5A3E; font-weight: bold; cursor: pointer; background: white; }
  
  /* 탭 네비게이션 */
  .tab-nav { display: flex; border-bottom: 1px solid #E5E5E5; padding: 0 10px; }
  .tab-btn { flex: 1; background: none; border: none; padding: 12px 0; font-size: 14px; color: #999; border-bottom: 2px solid transparent; outline: none; }
  .tab-btn.active { color: #3D5A3E; font-weight: bold; border-bottom: 2px solid #3D5A3E; }
  
  /* 메인 컨텐츠 */
  .content { padding: 20px; flex: 1; overflow-y: auto; }
  .keyword-card { background: #E8F0E9; border: 1px solid #C5D8C6; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .keyword-label { font-size: 11px; color: #555; font-weight: bold; margin-bottom: 8px; }
  .keyword-text { font-size: 22px; color: #222; font-weight: bold; margin: 0; }
  
  /* 리스트 공통 */
  .list-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #EAE8E3; }
  .item-profile { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-right: 12px; color: white; background: #3D5A3E; }
  .item-name { font-size: 15px; font-weight: 500; }
  .badge { font-size: 11px; padding: 4px 8px; border-radius: 12px; border: 1px solid #CCC; color: #888; }
  .badge.done { border-color: #3D5A3E; color: #3D5A3E; background: #E8F0E9; }

  /* 쓰기 화면 */
  .write-area { background: #FFF; border: 1px solid #EAE8E3; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  textarea { width: 100%; min-height: 250px; border: none; outline: none; font-size: 15px; line-height: 1.6; resize: none; background: transparent; }
  .btn-main { width: 100%; background: #3D5A3E; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; }
  
  /* 피드 화면 */
  .feed-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #EAE8E3; position: relative; }
  .feed-header { display: flex; align-items: center; margin-bottom: 12px; justify-content: space-between; }
  .feed-user-info { display: flex; align-items: center; }
  .feed-name { font-weight: bold; margin: 0 8px; font-size: 14px; }
  .feed-text { font-size: 15px; line-height: 1.6; color: #444; white-space: pre-wrap; margin-bottom: 16px; }
  .btn-delete { background: #FFEDED; color: #FF4D4D; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  
  /* 모달 */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: white; padding: 24px; border-radius: 12px; width: 90%; max-width: 320px; }
  .modal h3 { margin: 0 0 16px; font-size: 18px; }
  .modal input { width: 100%; padding: 12px; border: 1px solid #DDD; border-radius: 8px; margin-bottom: 16px; font-size: 16px; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; }
</style>
</head>
<body>

<div class="app" id="loginView">
  <div style="padding: 60px 20px; text-align: center;">
    <h2 style="color:#3D5A3E; margin-bottom: 10px;">Essay Club</h2>
    <input id="nameInput" placeholder="사용할 닉네임" style="width:100%; padding:16px; border:1px solid #DDD; border-radius:8px; margin-top:30px; font-size:16px;">
    <input id="codeInput" placeholder="초대코드" style="width:100%; padding:16px; border:1px solid #DDD; border-radius:8px; margin-top:10px; font-size:16px;">
    <button onclick="login()" class="btn-main" style="margin-top:20px;">시작하기</button>
  </div>
</div>

<div id="profileModal" class="modal-overlay hidden">
  <div class="modal">
    <h3>닉네임 변경</h3>
    <input id="editNameInput" placeholder="새 닉네임 입력">
    <div class="modal-btns">
      <button onclick="updateNickname()" style="background:#3D5A3E; color:white;">변경하기</button>
      <button onclick="logout()" style="background:#F0F0F0; color:#666;">로그아웃</button>
      <button onclick="toggleModal('profileModal', false)" style="background:none; color:#999;">닫기</button>
    </div>
  </div>
</div>

<div class="app hidden" id="mainView">
  <div class="header">
    <div class="header-title"><h1>글쓰기 클럽</h1><p id="adminStatus"></p></div>
    <div class="profile-circle" id="myCircle" onclick="toggleModal('profileModal', true)">?</div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">오늘</button>
    <button class="tab-btn" id="btn-write" onclick="switchTab('write')">쓰기</button>
    <button class="tab-btn" id="btn-feed" onclick="switchTab('feed')">피드</button>
    <button class="tab-btn" id="btn-member" onclick="switchTab('member')">멤버</button>
  </div>

  <div class="content" id="tab-today">
    <div class="keyword-card"><div class="keyword-label">오늘의 글감</div><h2 class="keyword-text" id="dispKeyword">로딩 중...</h2></div>
    <div id="adminBox" class="hidden" style="background:#EAE8E3; padding:16px; border-radius:8px; margin-bottom:24px;">
      <input id="keywordInput" placeholder="새 글감 입력" style="width:100%; padding:12px; border:1px solid #CCC; border-radius:4px; margin-bottom:10px;">
      <button onclick="saveKeyword()" class="btn-main" style="padding:12px; margin:0;">글감 변경</button>
    </div>
    <div class="list-header">오늘의 제출 현황</div>
    <div id="statusList"></div>
  </div>
