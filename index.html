<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>글쓰기 클럽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3D5A3E">
<style>
  body { margin: 0; background: #F7F5F0; font-family: -apple-system, sans-serif; color: #333; -webkit-tap-highlight-color: transparent; }
  * { box-sizing: border-box; }
  .app { max-width: 420px; margin: auto; background: #F7F5F0; min-height: 100vh; display: flex; flex-direction: column; }
  .hidden { display: none !important; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px; }
  .header-title h1 { margin: 0; font-size: 20px; color: #222; }
  .profile-circle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #3D5A3E; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #3D5A3E; font-weight: bold; cursor: pointer; background: white; }
  .tab-nav { display: flex; border-bottom: 1px solid #E5E5E5; padding: 0 10px; }
  .tab-btn { flex: 1; background: none; border: none; padding: 12px 0; font-size: 14px; color: #999; border-bottom: 2px solid transparent; outline: none; }
  .tab-btn.active { color: #3D5A3E; font-weight: bold; border-bottom: 2px solid #3D5A3E; }
  .content { padding: 20px; flex: 1; overflow-y: auto; }
  .keyword-card { background: #E8F0E9; border: 1px solid #C5D8C6; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .keyword-label { font-size: 11px; color: #555; font-weight: bold; margin-bottom: 8px; }
  .keyword-text { font-size: 22px; color: #222; font-weight: bold; margin: 0; }
  .list-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #EAE8E3; }
  .item-profile { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-right: 12px; color: white; background: #3D5A3E; }
  .badge { font-size: 11px; padding: 4px 8px; border-radius: 12px; border: 1px solid #CCC; color: #888; }
  .badge.done { border-color: #3D5A3E; color: #3D5A3E; background: #E8F0E9; }
  .write-area { background: #FFF; border: 1px solid #EAE8E3; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  textarea { width: 100%; min-height: 250px; border: none; outline: none; font-size: 15px; line-height: 1.6; resize: none; background: transparent; }
  .btn-main { width: 100%; background: #3D5A3E; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
  .feed-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #EAE8E3; position: relative; }
  .feed-header { display: flex; align-items: center; margin-bottom: 12px; justify-content: space-between; }
  .feed-name { font-weight: bold; margin: 0 8px; font-size: 14px; }
  .feed-text { font-size: 15px; line-height: 1.6; color: #444; white-space: pre-wrap; margin-bottom: 16px; }
  .btn-delete { background: #FFEDED; color: #FF4D4D; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: white; padding: 24px; border-radius: 12px; width: 90%; max-width: 320px; }
  .modal input { width: 100%; padding: 12px; border: 1px solid #DDD; border-radius: 8px; margin: 16px 0; font-size: 16px; }
</style>
</head>
<body>

<div class="app" id="loginView">
  <div style="padding: 60px 20px; text-align: center;">
    <h2 style="color:#3D5A3E">Essay Club</h2>
    <input id="phoneInput" type="tel" placeholder="휴대폰 번호 (- 없이)" style="width:100%; padding:16px; border:1px solid #DDD; border-radius:8px; margin-top:30px; font-size:16px;">
    <input id="nameInput" placeholder="닉네임" style="width:100%; padding:16px; border:1px solid #DDD; border-radius:8px; margin-top:10px; font-size:16px;">
    <input id="codeInput" placeholder="관리자 코드 (해당 시만)" style="width:100%; padding:16px; border:1px solid #DDD; border-radius:8px; margin-top:10px; font-size:16px;">
    <button onclick="login()" class="btn-main" style="margin-top:20px;">클럽 입장하기</button>
  </div>
</div>

<div id="profileModal" class="modal-overlay hidden">
  <div class="modal">
    <h3>닉네임 변경</h3>
    <input id="editNameInput">
    <div style="display:flex; gap:8px;">
      <button onclick="updateNickname()" style="flex:1; padding:12px; background:#3D5A3E; color:white; border:none; border-radius:8px; font-weight:bold;">변경완료</button>
      <button onclick="toggleModal('profileModal', false)" style="flex:1; padding:12px; background:#F0F0F0; color:#666; border:none; border-radius:8px;">닫기</button>
    </div>
  </div>
</div>

<div class="app hidden" id="mainView">
  <div class="header">
    <div class="header-title"><h1>글쓰기 클럽</h1><p id="adminStatus" style="font-size:11px; color:#3D5A3E; margin:0;"></p></div>
    <div class="profile-circle" id="myCircle" onclick="toggleModal('profileModal', true)">?</div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">오늘</button>
    <button class="tab-btn" id="btn-write" onclick="switchTab('write')">쓰기</button>
    <button class="tab-btn" id="btn-feed" onclick="switchTab('feed')">피드</button>
    <button class="tab-btn" id="btn-member" onclick="switchTab('member')">멤버</button>
  </div>

  <div class="content" id="tab-today">
    <div class="keyword-card"><div class="keyword-label">오늘의 글감</div><h2 class="keyword-text" id="dispKeyword">...</h2></div>
    <div id="adminBox" class="hidden" style="background:#EAE8E3; padding:16px; border-radius:8px; margin-bottom:20px;">
      <input id="keywordInput" placeholder="새 글감" style="width:100%; padding:10px; margin-bottom:10px;">
      <button onclick="saveKeyword()" class="btn-main" style="padding:10px; margin:0;">글감 변경</button>
    </div>
    <div class="list-header">제출 현황</div>
    <div id="statusList"></div>
  </div>

  <div class="content hidden" id="tab-write">
    <div class="write-area"><textarea id="mainText" placeholder="여기에 당신의 마음을..."></textarea></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <span id="saveStatus" style="font-size:12px; color:#999;">임시저장 완료</span>
      <label style="font-size:13px;"><input type="checkbox" id="isPvt"> 나만 보기</label>
    </div>
    <button onclick="submitPost()" class="btn-main">제출하기</button>
  </div>

  <div class="content hidden" id="tab-feed"><div id="feedList"></div></div>
  <div class="content hidden" id="tab-member"><div class="list-header">멤버</div><div id="memberList"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNtJ_BkroRRyq2d2dFLDb4gjumzRX85mk",
  authDomain: "essay-club.firebaseapp.com",
  projectId: "essay-club",
  storageBucket: "essay-club.firebasestorage.app",
  messagingSenderId: "282430977646",
  appId: "1:282430977646:web:8a1139948bb7f1b286587f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let myId = localStorage.getItem("essay_uid");
let isAdmin = localStorage.getItem("essay_role") === "admin";
let userMap = {};

onSnapshot(collection(db, "profiles"), (snap) => {
  snap.forEach(d => { userMap[d.id] = d.data().nickname; });
  if(myId && userMap[myId]) {
    document.getElementById('myCircle').textContent = userMap[myId][0];
    document.getElementById('editNameInput').value = userMap[myId];
  }
});

window.login = async function() {
  const phone = document.getElementById('phoneInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('codeInput').value.trim();
  if(!phone || !name) return alert("정보를 모두 입력해 주세요.");
  await setDoc(doc(db, "profiles", phone), { nickname: name }, { merge: true });
  localStorage.setItem("essay_uid", phone);
  if(code === "MASTER7") localStorage.setItem("essay_role", "admin");
  location.reload();
}

window.updateNickname = async () => {
  const newName = document.getElementById('editNameInput').value.trim();
  if(newName) await setDoc(doc(db, "profiles", myId), { nickname: newName }, { merge: true });
  toggleModal('profileModal', false);
}

window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);

if(myId) {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('mainView').classList.remove('hidden');
  if(isAdmin) {
    document.getElementById('adminBox').classList.remove('hidden');
    document.getElementById('adminStatus').textContent = "● 관리자 모드";
  }
}

const textEl = document.getElementById('mainText');
textEl.value = localStorage.getItem("essay_draft") || "";
textEl.addEventListener('input', () => localStorage.setItem("essay_draft", textEl.value));

onSnapshot(collection(db, "posts"), (snap) => {
  const today = new Date().toLocaleDateString();
  const all = new Set([myId]);
  const done = new Set();
  const counts = {};
  snap.forEach(s => {
    const d = s.data();
    all.add(d.uid);
    counts[d.uid] = (counts[d.uid] || 0) + 1;
    if(new Date(d.createdAt?.toDate()).toLocaleDateString() === today) done.add(d.uid);
  });

  const render = (elId, isM) => {
    const el = document.getElementById(elId);
    if(!el) return;
    el.innerHTML = "";
    Array.from(all).forEach(id => {
      const n = userMap[id] || "멤버";
      el.innerHTML += `<div class="list-item"><div class="item-profile">${n[0]}</div><div class="item-info"><b>${n}</b>${isM?`<div style='font-size:11px;color:#999;'>${counts[id]||0}편</div>`:''}</div>${!isM?`<div class="badge ${done.has(id)?'done':''}">${done.has(id)?'제출':'미제출'}</div>`:''}</div>`;
    });
  }
  render('statusList', false); render('memberList', true);
});

onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
  const feed = document.getElementById('feedList');
  feed.innerHTML = "";
  snap.forEach(s => {
    const d = s.data();
    if(d.isPrivate && d.uid !== myId && !isAdmin) return;
    const name = userMap[d.uid] || "멤버";
    const div = document.createElement('div');
    div.className = "feed-item";
    div.innerHTML = `<div class="feed-header"><div class="feed-user-info"><div class="item-profile" style="width:24px;height:24px;font-size:10px;">${name[0]}</div><div class="feed-name">${name} ${d.isPrivate?'🔒':''}</div></div>${isAdmin?`<button class="btn-delete" onclick="deletePost('${s.id}')">삭제</button>`:''}</div><div class="feed-text">${d.text}</div>`;
    feed.appendChild(div);
  });
});

window.submitPost = async () => {
  const t = textEl.value.trim();
  if(!t) return;
  await addDoc(collection(db, "posts"), { uid: myId, text: t, isPrivate: document.getElementById('isPvt').checked, createdAt: serverTimestamp() });
  textEl.value = ""; localStorage.removeItem("essay_draft"); switchTab('feed');
}

window.deletePost = async (id) => { if(confirm("삭제?")) await deleteDoc(doc(db, "posts", id)); }
window.switchTab = (id) => {
  ['today', 'write', 'feed', 'member'].forEach(v => { document.getElementById('tab-'+v).classList.add('hidden'); document.getElementById('btn-'+v).classList.remove('active'); });
  document.getElementById('tab-'+id).classList.remove('hidden'); document.getElementById('btn-'+id).classList.add('active');
}
window.saveKeyword = async () => {
  const t = document.getElementById('keywordInput').value.trim();
  if(t) await addDoc(collection(db, "keywords"), { text: t, date: Date.now() });
  document.getElementById('keywordInput').value = "";
}
onSnapshot(query(collection(db, "keywords"), orderBy("date", "desc"), limit(1)), (snap) => {
  snap.forEach(d => document.getElementById('dispKeyword').textContent = d.data().text);
});
</script>
</body>
</html>
