<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>에세이 클럽</title>
<style>
  :root { --main: #111; --bg: #FFF; --accent: #ff4d4d; }
  body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--main); overflow: hidden; height: 100vh; position: fixed; width: 100%; }
  * { box-sizing: border-box; }
  .app { max-width: 420px; margin: auto; height: 100vh; display: flex; flex-direction: column; position: relative; border-left: 1px solid #EEE; border-right: 1px solid #EEE; }
  .content { padding: 0 24px 120px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .hidden { display: none !important; }

  /* 헤더/인사말 */
  .header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 800; text-decoration: underline; cursor: pointer; margin: 0; }
  .welcome-section { padding: 40px 0 20px; border-bottom: 2px solid var(--main); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
  .welcome-msg { font-size: 24px; font-weight: 400; line-height: 1.4; margin: 0; }

  /* 글감 및 마스터 영역 */
  .keyword-card { border: 2.5px solid var(--main); border-radius: 24px; padding: 30px; margin-bottom: 35px; box-shadow: 8px 8px 0px var(--main); position: relative; }
  .master-box { margin-top: 20px; padding: 20px; border: 2px solid var(--accent); border-radius: 20px; background: #FFF; }
  .master-input { width: 100%; padding: 12px; border: 2px solid #EEE; border-radius: 12px; margin-bottom: 8px; font-size: 14px; outline: none; }

  /* 피드/태그 */
  .keyword-tag { display: inline-block; background: #f0f0f0; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-bottom: 12px; border: 1px solid #DDD; }
  .feed-card { border: 2px solid #111; border-radius: 20px; padding: 20px; margin-bottom: 15px; background: #FFF; position: relative; }
  .feed-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .mini-profile { width: 32px; height: 32px; border-radius: 50%; background: var(--main); color: #FFF; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }
  
  /* 📍 2번 해결: 비밀글 체크박스 정렬 */
  .private-wrap { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin: 10px 0 20px; font-weight: 600; font-size: 13px; color: #666; cursor: pointer; }
  .private-wrap input { width: 18px; height: 18px; margin: 0; cursor: pointer; }

  /* 네비게이션 */
  .tab-nav { display: flex; background: #FFF; border-top: 2px solid var(--main); padding: 16px 16px calc(25px + env(safe-area-inset-bottom)); position: absolute; bottom: 0; width: 100%; gap: 10px; z-index: 1000; }
  .tab-btn { flex: 1; border: 2px solid var(--main); padding: 14px 0; background: #FFF; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; }
  .tab-btn.active { background: var(--main); color: #FFF; }

  /* 📍 3번 해결: 수정 전용 대형 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.98); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .edit-modal { width: 100%; max-width: 420px; height: 100vh; padding: 40px 24px; background: #FFF; display: flex; flex-direction: column; }
  
  .btn-next { width: 100%; padding: 20px; background: var(--main); color: #FFF; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; }
  input, textarea { width: 100%; padding: 18px; border: 2px solid var(--main); border-radius: 16px; font-size: 16px; outline: none; margin-bottom: 10px; }
  .badge { font-size: 9px; border: 1px solid #111; padding: 2px 6px; border-radius: 6px; margin-top: 4px; display: inline-block; }
  .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .status-item { border: 2px solid var(--main); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 10px; background: white; }
</style>
</head>
<body>

<div class="app">
  <div id="mainUI" class="hidden" style="display:flex; flex-direction:column; height:100%;">
    <div class="header">
      <h1 id="mainTitle">에세이 클럽</h1>
      <div id="myCircle" class="mini-profile" onclick="toggleModal('editProfileModal', true)" style="cursor:pointer;">?</div>
    </div>

    <div class="content" id="tab-today">
      <div class="welcome-section"><h2 class="welcome-msg" id="dynamicWelcome">연결 중...</h2><img src="mole.png" alt="" style="width:80px;" onerror="this.style.display='none'"></div>
      <div class="keyword-card">
        <small style="font-weight:800;">오늘의 글감</small>
        <h2 id="dispKeyword" style="margin:12px 0 0; font-size:24px; font-weight:800;">...</h2>
        <div id="adminPanel" class="master-box hidden">
          <h4 style="margin:0 0 12px; font-size:14px; color:var(--accent);">🚨 마스터: 글감 창고</h4>
          <div style="display:flex; gap:5px; margin-bottom:8px;"><input id="newKw" class="master-input" type="text" placeholder="글감"><input id="kwDate" class="master-input" type="date" style="flex:1.2;"></div>
          <button onclick="saveKeyword()" style="width:100%; padding:12px; background:var(--accent); color:#FFF; border:none; border-radius:12px; font-weight:800; cursor:pointer;">예약 저장</button>
          <div id="reservedListUI" style="margin-top:10px; font-size:12px; max-height:100px; overflow-y:auto;"></div>
        </div>
      </div>
      <div id="statusList" class="status-grid"></div>
    </div>

    <div class="content hidden" id="tab-write">
      <div style="padding-top:40px;">
        <div style="background:#f9f9f9; border:2px solid #111; border-radius:16px; padding:15px; margin-bottom:20px; font-size:14px;"><b>💡 오늘의 글감:</b> <span id="writeTabKeyword">...</span></div>
        <h2 style="font-weight:800; margin-bottom:5px;">에세이 쓰기</h2>
        <input id="postTitle" type="text" placeholder="제목 (선택)" style="font-weight:700;">
        <div id="charCount" style="text-align:right; font-size:12px; color:#999;">0 / 1,000자</div>
        <textarea id="postText" style="height:250px;" placeholder="생각을 적어보세요."></textarea>
        <label class="private-wrap"><input type="checkbox" id="isPrivate"> <span>비밀글로 업로드</span></label>
        <button id="submitBtn" onclick="submitPost()" class="btn-next" style="opacity:0.3;" disabled>제출하기</button>
      </div>
    </div>

    <div class="content hidden" id="tab-feed">
      <div style="padding-top:40px;">
        <h2 style="font-weight:800; margin-bottom:15px;">모두의 피드</h2>
        <div style="display:flex; gap:8px; margin-bottom:20px;"><select id="filterMember" onchange="renderFeed()" style="padding:8px; border:2px solid #111; border-radius:12px;"></select><input id="filterDate" type="date" onchange="renderFeed()" style="padding:8px; border:2px solid #111; border-radius:12px; flex:1;"></div>
        <div id="feedList"></div>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">오늘</button>
      <button class="tab-btn" id="btn-write" onclick="switchTab('write')">쓰기</button>
      <button class="tab-btn" id="btn-feed" onclick="switchTab('feed')">피드</button>
    </div>
  </div>

  <!-- 가입 모달 -->
  <div id="authModal" class="modal-overlay hidden"><div class="modal" style="text-align:center; padding:20px;"><h2>Essay Club</h2><div id="authStep1"><input id="phoneInput" type="tel" placeholder="번호 입력"><button onclick="checkUser()" class="btn-next">시작</button></div><div id="authStep2" class="hidden"><input id="nickInput" placeholder="닉네임"><button onclick="finishJoin()" class="btn-next">입장</button></div></div></div>

  <!-- 📍 3번 해결: 수정 전용 모달창 UI -->
  <div id="editPostModal" class="modal-overlay hidden">
    <div class="edit-modal">
      <h2 style="font-weight:800;">에세이 수정</h2>
      <input id="editPostTitle" type="text" placeholder="제목" style="font-weight:700;">
      <textarea id="editPostText" style="flex:1; margin-bottom:20px;" placeholder="내용을 수정하세요."></textarea>
      <button onclick="saveEditPost()" class="btn-next">수정 완료</button>
      <button onclick="toggleModal('editPostModal', false)" style="background:none; border:none; margin-top:15px; color:#999; cursor:pointer;">취소</button>
    </div>
  </div>

  <div id="editProfileModal" class="modal-overlay hidden"><div class="modal" style="background:#FFF; padding:30px; border-radius:24px;"><h3>닉네임 수정</h3><input id="editNickInput"><button onclick="updateProfile()" class="btn-next">저장</button><button onclick="toggleModal('editProfileModal', false)" style="color:#999; border:none; background:none; margin-top:10px;">닫기</button></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where, orderBy, limit, doc, setDoc, getDoc, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyBNtJ_BkroRRyq2d2dFLDb4gjumzRX85mk", authDomain: "essay-club.firebaseapp.com", projectId: "essay-club", storageBucket: "essay-club.firebasestorage.app", messagingSenderId: "282430977646", appId: "1:282430977646:web:8a1139948bb7f1b286587f" };
const app = initializeApp(firebaseConfig); const db = getFirestore(app);

// 📍 1번 해결: 본인의 가입 번호를 여기에 정확히 기입하세요
const MY_REAL_PHONE = "01012345678"; 

let myId = localStorage.getItem("essay_uid");
let allPosts = []; let userMap = {}; let currentEditId = null;

window.onload = () => { 
    if(!myId) { toggleModal('authModal', true); } 
    else { document.getElementById('mainUI').classList.remove('hidden'); startApp(myId); }
};

window.switchTab = (id) => {
  document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.remove('hidden');
  document.getElementById('btn-'+id)?.classList.add('active');
};
window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);

document.getElementById('postText')?.addEventListener('input', (e) => {
  const len = e.target.value.length;
  document.getElementById('charCount').textContent = `${len.toLocaleString()} / 1,000자`;
  document.getElementById('submitBtn').disabled = len === 0 || len > 1000;
  document.getElementById('submitBtn').style.opacity = len === 0 ? "0.3" : "1";
});

function startApp(uid) {
  if(uid === "master_admin") { document.getElementById('adminPanel').classList.remove('hidden'); loadReservedKeywords(); }
  onSnapshot(collection(db, "profiles"), (pSnap) => {
    userMap = {}; const filterSel = document.getElementById('filterMember');
    if(filterSel) filterSel.innerHTML = '<option value="all">모든 멤버</option>';
    pSnap.forEach(d => { 
      userMap[d.id] = d.data().nickname; 
      if(d.id !== "master_admin" && filterSel) filterSel.innerHTML += `<option value="${d.id}">${d.data().nickname}</option>`;
    });
    onSnapshot(collection(db, "posts"), (postSnap) => {
      const todayStr = new Date().toLocaleDateString();
      const doneIds = new Set(); allPosts = [];
      postSnap.forEach(s => { 
        const d = s.data(); if(d.createdAt && new Date(d.createdAt.toDate()).toLocaleDateString() === todayStr) doneIds.add(d.uid);
        allPosts.push({ id: s.id, ...d }); 
      });
      const myName = userMap[uid] || "멤버";
      document.getElementById('dynamicWelcome').innerHTML = `<b>${myName}</b>님, 반가워요!`;
      document.getElementById('myCircle').textContent = myName[0];
      const sList = document.getElementById('statusList'); if(sList) sList.innerHTML = "";
      Object.entries(userMap).forEach(([id, name]) => {
        if(id === "master_admin") return;
        const done = doneIds.has(id);
        if(sList) sList.innerHTML += `<div class="status-item"><div class="mini-profile">${name[0]}</div><div><b>${name}</b><br><span class="badge" style="background:${done?'#111':'#FFF'}; color:${done?'#FFF':'#111'};">${done?'완료':'미제출'}</span></div></div>`;
      });
      renderFeed();
    });
  });
  const todayISO = new Date().toISOString().split('T')[0];
  onSnapshot(query(collection(db, "keywords"), where("date", "<=", todayISO), orderBy("date", "desc"), limit(1)), (snap) => {
    snap.forEach(d => { 
        document.getElementById('dispKeyword').textContent = d.data().text; 
        document.getElementById('writeTabKeyword').textContent = d.data().text; 
    });
  });
}

window.renderFeed = () => {
  const mVal = document.getElementById('filterMember')?.value || "all";
  const dVal = document.getElementById('filterDate')?.value || "";
  const feedEl = document.getElementById('feedList'); if(!feedEl) return;
  feedEl.innerHTML = "";
  const filtered = allPosts.filter(p => {
    const postDate = p.createdAt?.toDate().toISOString().split('T')[0];
    return (mVal === "all" || p.uid === mVal) && (!dVal || postDate === dVal);
  });
  filtered.sort((a,b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0)).forEach(p => {
    const name = userMap[p.uid] || "멤버"; const isMy = p.uid === myId;
    feedEl.innerHTML += `<div class="feed-card"><div class="keyword-tag"># ${p.keyword || '글감'}</div><div class="feed-header"><div style="display:flex; align-items:center; gap:8px;"><div class="mini-profile">${name[0]}</div><b>${name}</b></div><div style="font-size:11px; color:#999;">${isMy ? `<span style="cursor:pointer; text-decoration:underline;" onclick="openEditModal('${p.id}', '${p.title||''}', \`${p.text.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)">수정</span> <span style="cursor:pointer; text-decoration:underline; margin-left:8px;" onclick="deletePost('${p.id}')">삭제</span>` : ''}</div></div><h3>${p.title||''}</h3><div style="white-space:pre-wrap;">${(p.isPrivate && !isMy) ? '비밀글입니다. 🔒' : p.text}</div></div>`;
  });
};

// 📍 3번 해결: 수정 모달 열기 함수
window.openEditModal = (id, title, text) => {
    currentEditId = id;
    document.getElementById('editPostTitle').value = title;
    document.getElementById('editPostText').value = text;
    toggleModal('editPostModal', true);
};

// 📍 3번 해결: 수정 내용 저장 함수
window.saveEditPost = async () => {
    if(!currentEditId) return;
    const newTitle = document.getElementById('editPostTitle').value;
    const newText = document.getElementById('editPostText').value;
    await updateDoc(doc(db, "posts", currentEditId), { title: newTitle, text: newText });
    toggleModal('editPostModal', false);
    alert("수정되었습니다.");
};

window.submitPost = async () => {
  const kw = document.getElementById('writeTabKeyword').textContent;
  const title = document.getElementById('postTitle').value;
  const text = document.getElementById('postText').value;
  const isPvt = document.getElementById('isPrivate').checked;
  await addDoc(collection(db, "posts"), { uid: myId, title, text, isPrivate: isPvt, keyword: kw, createdAt: serverTimestamp() });
  location.reload();
};

window.checkUser = async () => {
  const p = document.getElementById('phoneInput').value; myId = p; 
  const d = await getDoc(doc(db, "profiles", p));
  if(d.exists()) { localStorage.setItem("essay_uid", p); location.reload(); }
  else { document.getElementById('authStep1').classList.add('hidden'); document.getElementById('authStep2').classList.remove('hidden'); }
};

window.finishJoin = async () => {
  const n = document.getElementById('nickInput').value;
  await setDoc(doc(db, "profiles", myId), { nickname: n, joinedAt: serverTimestamp() });
  localStorage.setItem("essay_uid", myId); location.reload();
};

let cc = 0; let lt = 0;
document.getElementById('mainTitle').addEventListener('click', () => {
  const n = Date.now(); if(n-lt < 1000) cc++; else cc=1; lt=n;
  if(cc===5) { 
    if(localStorage.getItem("essay_uid") === "master_admin") {
        if(confirm("내 계정으로 돌아갈까요?")) { 
            localStorage.setItem("essay_uid", MY_REAL_PHONE); // 📍 1번 해결 포인트
            location.reload(); 
        }
    } else {
        const c = prompt("코드:"); if(c === "0519") { localStorage.setItem("essay_uid", "master_admin"); location.reload(); }
    }
    cc = 0;
  }
});

function loadReservedKeywords() {
  onSnapshot(query(collection(db, "keywords"), orderBy("date", "asc")), (snap) => {
    const list = document.getElementById('reservedListUI'); if(list) list.innerHTML = "";
    snap.forEach(d => { if(list) list.innerHTML += `<div>${d.data().date} : ${d.data().text}</div>`; });
  });
}
window.saveKeyword = async () => {
  const t = document.getElementById('newKw').value; const d = document.getElementById('kwDate').value;
  await addDoc(collection(db, "keywords"), { text: t, date: d }); alert("저장됨");
};
window.deletePost = async (id) => { if(confirm("삭제?")) await deleteDoc(doc(db, "posts", id)); };
window.updateProfile = async () => {
  const n = document.getElementById('editNickInput').value; await updateDoc(doc(db, "profiles", myId), { nickname: n }); location.reload();
};
</script>
</body>
</html>
