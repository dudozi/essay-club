<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>에세이 클럽</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="에세이 클럽">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root { --main: #111; --bg: #FFF; --accent: #ff4d4d; }
  body {
    margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--main);
    height: 100svh; width: 100%; position: fixed; overflow: hidden;
  }
  * { box-sizing: border-box; }
  .app { max-width: 420px; margin: auto; height: 100svh; display: flex; flex-direction: column; position: relative; background: var(--bg); }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 24px 20px; }
  .hidden { display: none !important; }

  .header {
    padding: calc(15px + env(safe-area-inset-top)) 24px 10px;
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .header h1 { font-size: 20px; font-weight: 800; text-decoration: underline; cursor: pointer; margin: 0; }

  .tab-nav {
    display: flex; background: #FFF; border-top: 2px solid var(--main);
    padding: 12px 16px max(12px, env(safe-area-inset-bottom));
    width: 100%; gap: 10px; z-index: 1000; flex-shrink: 0;
  }
  .tab-btn { flex: 1; border: 2px solid var(--main); padding: 14px 0; background: #FFF; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; }
  .tab-btn.active { background: var(--main); color: #FFF; }

  .private-wrap { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin: 15px 0; font-weight: 600; font-size: 13px; color: #666; cursor: pointer; }
  .private-wrap input { width: 18px; height: 18px; margin: 0; cursor: pointer; }

  .modal-overlay { position: fixed; inset: 0; background: #FFF; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .edit-container { width: 100%; height: 100%; padding: 60px 24px; display: flex; flex-direction: column; overflow-y: auto; }

  .btn-next { width: 100%; padding: 20px; background: var(--main); color: #FFF; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; }
  .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
  input, textarea { width: 100%; padding: 18px; border: 2px solid var(--main); border-radius: 16px; font-size: 16px; outline: none; margin-bottom: 12px; font-family: inherit; background: #FFF; }
  .mini-profile { width: 32px; height: 32px; border-radius: 50%; background: var(--main); color: #FFF; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
  .feed-card { border: 2px solid #111; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
  .keyword-tag { display: inline-block; background: #f0f0f0; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-bottom: 12px; border: 1px solid #DDD; }
  .already-submitted-banner { background: #f0f0f0; border: 2px solid #111; border-radius: 16px; padding: 20px; text-align: center; font-weight: 700; margin-top: 20px; }

  .auth-box { padding: 32px 24px; width: 100%; max-width: 360px; }
  .auth-box h2 { font-size: 26px; font-weight: 800; margin: 0 0 6px; }
  .auth-sub { font-size: 14px; color: #888; margin: 0 0 28px; line-height: 1.5; }
  .auth-error { font-size: 13px; color: var(--accent); margin: -6px 0 10px; min-height: 18px; }
  .auth-back { background: none; border: none; font-size: 14px; color: #999; margin-top: 14px; cursor: pointer; text-decoration: underline; display: block; width: 100%; text-align: center; }

  .kw-manage-card { border: 1.5px solid #DDD; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .kw-date { font-size: 11px; color: #999; margin-top: 2px; }
  .kw-manage-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .kw-btn { border: 1.5px solid #111; background: #FFF; border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .kw-btn.del { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="app">

  <!-- ── 메인 UI ── -->
  <div id="mainUI" class="hidden" style="flex-direction:column; height:100%;">
    <div class="header">
      <h1 id="mainTitle">에세이 클럽</h1>
      <div id="myCircle" class="mini-profile">?</div>
    </div>

    <div class="content" id="tab-today">
      <div style="padding:40px 0 20px; border-bottom:2px solid #111; margin-bottom:30px; display:flex; justify-content:space-between; align-items:center;">
        <h2 id="dynamicWelcome" style="font-size:24px; font-weight:400; line-height:1.4; margin:0;">반가워요!</h2>
        <img src="mole.png" style="width:80px;" onerror="this.style.display='none'">
      </div>
      <div style="border:2.5px solid #111; border-radius:24px; padding:30px; margin-bottom:30px; box-shadow:8px 8px 0px #111;">
        <small style="font-weight:800;">오늘의 글감</small>
        <h2 id="dispKeyword" style="margin:12px 0 0; font-size:24px; font-weight:800;">...</h2>
      </div>
      <div id="statusList" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>

    <div class="content hidden" id="tab-write">
      <div style="padding-top:20px;">
        <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:20px;">
          💡 글감: <span id="writeTabKeyword">...</span>
        </div>
        <div id="writeForm">
          <input id="postTitle" type="text" placeholder="제목">
          <textarea id="postText" style="height:300px;" placeholder="생각을 채워주세요."></textarea>
          <label class="private-wrap"><input type="checkbox" id="isPrivate"> <span>비밀글로 업로드</span></label>
          <button id="submitBtn" class="btn-next" style="opacity:0.3;" disabled>제출하기</button>
        </div>
        <div id="alreadySubmitted" class="already-submitted-banner hidden">
          ✅ 오늘의 글을 이미 제출했어요!<br>
          <span style="font-weight:400; font-size:14px; margin-top:8px; display:block;">피드에서 확인해보세요.</span>
        </div>
      </div>
    </div>

    <div class="content hidden" id="tab-feed">
      <div style="padding-top:20px;">
        <h2 style="font-weight:800;">피드</h2>
        <div id="feedList"></div>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">오늘</button>
      <button class="tab-btn" id="btn-write" onclick="switchTab('write')">쓰기</button>
      <button class="tab-btn" id="btn-feed" onclick="switchTab('feed')">피드</button>
    </div>
  </div>

  <!-- 글 수정 모달 -->
  <div id="editPostModal" class="modal-overlay hidden">
    <div class="edit-container">
      <h2 style="font-weight:800; margin-bottom:20px;">에세이 수정</h2>
      <input id="editPostTitle" type="text" placeholder="제목">
      <textarea id="editPostText" style="flex:1; min-height:200px;"></textarea>
      <button id="saveEditBtn" class="btn-next">수정 완료</button>
      <button onclick="toggleModal('editPostModal', false)" class="auth-back">취소</button>
    </div>
  </div>

  <!-- 어드민: 글감 관리 모달 -->
  <div id="adminModal" class="modal-overlay hidden">
    <div class="edit-container">
      <h2 style="font-weight:800; margin-bottom:4px;">글감 관리</h2>
      <p style="color:#666; font-size:14px; margin-bottom:20px;">글감을 추가하거나 수정·삭제할 수 있습니다.</p>
      <div style="border:2px solid #111; border-radius:16px; padding:16px; margin-bottom:20px;">
        <p style="font-weight:800; margin:0 0 12px;">새 글감 추가</p>
        <input id="newKw" placeholder="글감 내용">
        <input id="kwDate" type="date">
        <button id="saveKwBtn" class="btn-next" style="padding:14px;">저장하기</button>
      </div>
      <p style="font-weight:800; margin:0 0 12px;">등록된 글감</p>
      <div id="kwList" style="overflow-y:auto; flex:1;"></div>
      <button onclick="toggleModal('adminModal', false)" class="auth-back">닫기</button>
    </div>
  </div>

  <!-- ── 인증 모달 ── -->
  <div id="authModal" class="modal-overlay">
    <!-- Step 1: 공통 암호 -->
    <div id="authStep1" class="auth-box">
      <h2>Essay Club</h2>
      <p class="auth-sub">클럽 암호를 입력해주세요.</p>
      <input id="pwInput" type="password" placeholder="클럽 암호">
      <p id="pwError" class="auth-error"></p>
      <button id="pwBtn" class="btn-next">다음</button>
    </div>
    <!-- Step 2: 닉네임 -->
    <div id="authStep2" class="auth-box hidden">
      <h2>닉네임 입력</h2>
      <p class="auth-sub">활동할 닉네임을 입력해주세요.<br>이미 사용 중인 닉네임이면 그대로 로그인됩니다.</p>
      <input id="nicknameInput" type="text" placeholder="닉네임 (예: 규원)" maxlength="10">
      <p id="nicknameError" class="auth-error"></p>
      <button id="nicknameBtn" class="btn-next">시작하기</button>
      <button id="backToPw" class="auth-back">← 암호 다시 입력</button>
    </div>
  </div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, doc, getDoc, setDoc, addDoc, updateDoc,
         deleteDoc, onSnapshot, query, where, orderBy, limit, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey: "AIzaSyBNtJ_BkroRRyq2d2dFLDb4gjumzRX85mk",
  authDomain: "essay-club.firebaseapp.com",
  projectId: "essay-club",
  storageBucket: "essay-club.firebasestorage.app",
  messagingSenderId: "282430977646",
  appId: "1:282430977646:web:8a1139948bb7f1b286587f"
}));

// ── 상태 ─────────────────────────────────────────────────────────────────────
let myId           = null;
let myName         = '멤버';
let amIAdmin       = false;
let allPosts       = [];
let allKeywords    = [];
let userMap        = {};
let todaySubmitted = false;
let currentEditId  = null;
let profilesUnsub  = null;
let postsUnsub     = null;
let keywordsUnsub  = null;

// ── 유틸 ─────────────────────────────────────────────────────────────────────
const getTodayISO  = () => new Date().toISOString().split('T')[0];
const isSameDay    = ts => ts?.toDate().toISOString().split('T')[0] === getTodayISO();
const getIsWeekend = () => { const d = new Date().getDay(); return d === 0 || d === 6; };

function el(tag, props = {}, children = []) {
  const node = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'style') Object.assign(node.style, v);
    else if (k === 'className') node.className = v;
    else if (k === 'textContent') node.textContent = v;
    else node.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') node.appendChild(document.createTextNode(c));
    else if (c) node.appendChild(c);
  });
  return node;
}

window.switchTab = id => {
  document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.remove('hidden');
  document.getElementById('btn-' + id)?.classList.add('active');
};
window.toggleModal = (id, show) =>
  document.getElementById(id).classList.toggle('hidden', !show);

// ── 세션 복원 ────────────────────────────────────────────────────────────────
window.onload = async () => {
  const saved = localStorage.getItem('essay_session');
  if (saved) {
    const snap = await getDoc(doc(db, 'profiles', saved));
    if (snap.exists()) {
      myId     = saved;
      myName   = snap.data().nickname;
      amIAdmin = !!snap.data().isAdmin;
      showMain();
      return;
    }
    localStorage.removeItem('essay_session');
  }
  // 세션 없으면 authModal 표시 (기본값)
};

function showMain() {
  document.getElementById('authModal').classList.add('hidden');
  const mainUI = document.getElementById('mainUI');
  mainUI.classList.remove('hidden');
  mainUI.style.display = 'flex';
  startApp();
}

// ── 인증 Step 1: 공통 암호 ───────────────────────────────────────────────────
document.getElementById('pwBtn').addEventListener('click', async () => {
  const pw    = document.getElementById('pwInput').value.trim();
  const errEl = document.getElementById('pwError');
  errEl.textContent = '';
  if (!pw) { errEl.textContent = '암호를 입력해주세요.'; return; }

  const btn = document.getElementById('pwBtn');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    // Firestore config/secret 문서의 password 필드와 비교
    const snap = await getDoc(doc(db, 'config', 'secret'));
    if (!snap.exists() || snap.data().password !== pw) {
      errEl.textContent = '암호가 올바르지 않습니다.';
      return;
    }
    document.getElementById('authStep1').classList.add('hidden');
    document.getElementById('authStep2').classList.remove('hidden');
    document.getElementById('nicknameInput').focus();
  } catch {
    errEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
  } finally {
    btn.disabled = false; btn.textContent = '다음';
  }
});
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pwBtn').click();
});

// ── 인증 Step 2: 닉네임 ──────────────────────────────────────────────────────
document.getElementById('nicknameBtn').addEventListener('click', async () => {
  const nickname = document.getElementById('nicknameInput').value.trim();
  const errEl    = document.getElementById('nicknameError');
  errEl.textContent = '';

  if (!nickname)          { errEl.textContent = '닉네임을 입력해주세요.'; return; }
  if (nickname.length < 2) { errEl.textContent = '닉네임은 2자 이상이어야 합니다.'; return; }

  const btn = document.getElementById('nicknameBtn');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const profRef = doc(db, 'profiles', nickname);
    const snap    = await getDoc(profRef);

    if (snap.exists()) {
      // 기존 닉네임 → 로그인
      myId     = nickname;
      myName   = snap.data().nickname;
      amIAdmin = !!snap.data().isAdmin;
    } else {
      // 신규 닉네임 → 가입
      await setDoc(profRef, { nickname, isAdmin: false, joinedAt: serverTimestamp() });
      myId     = nickname;
      myName   = nickname;
      amIAdmin = false;
    }

    localStorage.setItem('essay_session', myId);
    showMain();
  } catch {
    errEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
  } finally {
    btn.disabled = false; btn.textContent = '시작하기';
  }
});
document.getElementById('nicknameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('nicknameBtn').click();
});
document.getElementById('backToPw').addEventListener('click', () => {
  document.getElementById('authStep2').classList.add('hidden');
  document.getElementById('authStep1').classList.remove('hidden');
  document.getElementById('pwInput').value = '';
  document.getElementById('nicknameInput').value = '';
});

// ── 앱 시작 ──────────────────────────────────────────────────────────────────
function startApp() {
  document.getElementById('myCircle').textContent = myName[0];

  if (amIAdmin && !document.getElementById('adminOpenBtn')) {
    const btn = el('button', {
      style: { background:'none', border:'1.5px solid #111', borderRadius:'8px',
               padding:'5px 10px', fontSize:'12px', fontWeight:'700', cursor:'pointer', marginRight:'8px' },
      textContent: '글감관리'
    });
    btn.id = 'adminOpenBtn';
    btn.addEventListener('click', () => { renderKeywordList(); toggleModal('adminModal', true); });
    document.querySelector('.header').insertBefore(btn, document.getElementById('myCircle'));
  }

  if (profilesUnsub) profilesUnsub();
  profilesUnsub = onSnapshot(collection(db, 'profiles'), snap => {
    userMap = {};
    snap.forEach(d => { userMap[d.id] = d.data().nickname; });
    renderStatusAndWelcome();
    renderFeed();
  });

  if (postsUnsub) postsUnsub();
  postsUnsub = onSnapshot(collection(db, 'posts'), snap => {
    allPosts = [];
    const doneIds = new Set();
    snap.forEach(s => {
      const d = s.data();
      if (isSameDay(d.createdAt)) doneIds.add(d.uid);
      allPosts.push({ id: s.id, ...d });
    });
    todaySubmitted = doneIds.has(myId);
    document.getElementById('writeForm').classList.toggle('hidden', todaySubmitted);
    document.getElementById('alreadySubmitted').classList.toggle('hidden', !todaySubmitted);
    renderStatusAndWelcome(doneIds);
    renderFeed();
  });

  if (keywordsUnsub) keywordsUnsub();
  keywordsUnsub = onSnapshot(
    query(collection(db, 'keywords'), where('date', '<=', getTodayISO()),
          orderBy('date', 'desc'), limit(1)),
    snap => {
      if (snap.empty) {
        document.getElementById('dispKeyword').textContent = '글감이 없습니다';
        document.getElementById('writeTabKeyword').textContent = '글감 없음';
        return;
      }
      snap.forEach(d => {
        const t = d.data().text;
        document.getElementById('dispKeyword').textContent = t;
        document.getElementById('writeTabKeyword').textContent = t;
      });
    }
  );

  onSnapshot(query(collection(db, 'keywords'), orderBy('date', 'desc')), snap => {
    allKeywords = [];
    snap.forEach(d => allKeywords.push({ id: d.id, ...d.data() }));
  });
}

// ── 오늘 탭 ──────────────────────────────────────────────────────────────────
function renderStatusAndWelcome(doneIds = new Set()) {
  const welcomeEl = document.getElementById('dynamicWelcome');
  welcomeEl.innerHTML = '';
  const bold = el('b', { textContent: myName });
  let rest;
  if (getIsWeekend())         rest = '님, 주말은 클럽도\n쉬어갑니다. 푹 쉬세요!';
  else if (doneIds.has(myId)) rest = '님의 생각이\n차곡 쌓였어요';
  else                        rest = '님, 오늘의 생각을\n붙잡아 보세요!';
  welcomeEl.appendChild(bold);
  welcomeEl.appendChild(document.createTextNode(rest));

  const sList = document.getElementById('statusList');
  if (!sList) return;
  sList.innerHTML = '';
  Object.entries(userMap).forEach(([id, name]) => {
    const done = doneIds.has(id);
    const card = el('div', { style: { border:'2px solid #111', padding:'15px', borderRadius:'20px', display:'flex', alignItems:'center', gap:'10px' } });
    card.appendChild(el('b', { textContent: name }));
    card.appendChild(el('span', {
      style: { fontSize:'10px', padding:'2px 5px', border:'1px solid #111', borderRadius:'5px',
               background: done ? '#111' : '#FFF', color: done ? '#FFF' : '#111' },
      textContent: done ? '완료' : '미제출'
    }));
    sList.appendChild(card);
  });
}

// ── 피드 ─────────────────────────────────────────────────────────────────────
window.renderFeed = () => {
  const feedEl = document.getElementById('feedList');
  if (!feedEl) return;
  feedEl.innerHTML = '';

  const sorted = [...allPosts]
    .sort((a, b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0))
    .slice(0, 30);

  sorted.forEach(p => {
    const name      = userMap[p.uid] || '멤버';
    const isMy      = p.uid === myId;
    const isPrivate = p.isPrivate && !isMy;

    const card = el('div', { className: 'feed-card' });
    card.appendChild(el('div', { className: 'keyword-tag', textContent: `# ${p.keyword || '글감'}` }));

    const headerRow = el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px' } });
    headerRow.appendChild(el('b', { textContent: name }));

    const btnWrap = el('div', { style: { display:'flex', gap:'10px' } });
    if (isMy) {
      const editBtn = el('span', { style: { textDecoration:'underline', cursor:'pointer', fontSize:'12px' }, textContent: '수정' });
      editBtn.addEventListener('click', () => openEditModal(p.id, p.title || '', p.text));
      btnWrap.appendChild(editBtn);
    }
    if (amIAdmin) {
      const delBtn = el('span', { style: { textDecoration:'underline', cursor:'pointer', fontSize:'12px', color:'#ff4d4d' }, textContent: '삭제' });
      delBtn.addEventListener('click', async () => {
        if (!confirm('이 글을 삭제할까요?')) return;
        try { await deleteDoc(doc(db, 'posts', p.id)); }
        catch { alert('삭제에 실패했습니다.'); }
      });
      btnWrap.appendChild(delBtn);
    }
    headerRow.appendChild(btnWrap);
    card.appendChild(headerRow);
    if (p.title) card.appendChild(el('h3', { textContent: p.title, style: { margin:'8px 0' } }));
    card.appendChild(el('p', {
      style: { whiteSpace:'pre-wrap', margin:'0', color: isPrivate ? '#999' : '#111' },
      textContent: isPrivate ? '비밀글입니다. 🔒' : p.text
    }));
    feedEl.appendChild(card);
  });

  if (sorted.length === 30 && allPosts.length > 30) {
    feedEl.appendChild(el('div', {
      style: { textAlign:'center', padding:'16px', color:'#999', fontSize:'13px' },
      textContent: `최근 30개만 표시됩니다. (전체 ${allPosts.length}개)`
    }));
  }
};

// ── 글 수정 ──────────────────────────────────────────────────────────────────
function openEditModal(id, title, text) {
  currentEditId = id;
  document.getElementById('editPostTitle').value = title;
  document.getElementById('editPostText').value  = text;
  toggleModal('editPostModal', true);
}
document.getElementById('saveEditBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveEditBtn');
  btn.disabled = true; btn.textContent = '수정 중...';
  try {
    await updateDoc(doc(db, 'posts', currentEditId), {
      title: document.getElementById('editPostTitle').value,
      text:  document.getElementById('editPostText').value
    });
    toggleModal('editPostModal', false);
    alert('수정되었습니다.');
  } catch {
    alert('수정에 실패했습니다. 다시 시도해주세요.');
  } finally {
    btn.disabled = false; btn.textContent = '수정 완료';
  }
});

// ── 글 제출 ──────────────────────────────────────────────────────────────────
document.getElementById('postText')?.addEventListener('input', e => {
  const len = e.target.value.trim().length;
  const btn = document.getElementById('submitBtn');
  btn.disabled = len === 0;
  btn.style.opacity = len === 0 ? '0.3' : '1';
});
document.getElementById('submitBtn').addEventListener('click', async () => {
  if (todaySubmitted) { alert('오늘은 이미 제출하셨습니다!'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '제출 중...';
  try {
    await addDoc(collection(db, 'posts'), {
      uid:       myId,
      title:     document.getElementById('postTitle').value,
      text:      document.getElementById('postText').value,
      isPrivate: document.getElementById('isPrivate').checked,
      keyword:   document.getElementById('writeTabKeyword').textContent,
      createdAt: serverTimestamp()
    });
    todaySubmitted = true;
    document.getElementById('writeForm').classList.add('hidden');
    document.getElementById('alreadySubmitted').classList.remove('hidden');
    switchTab('feed');
  } catch {
    alert('제출에 실패했습니다. 다시 시도해주세요.');
    btn.disabled = false; btn.textContent = '제출하기';
  }
});

// ── 글감 관리 (어드민) ───────────────────────────────────────────────────────
function renderKeywordList() {
  const listEl = document.getElementById('kwList');
  listEl.innerHTML = '';
  if (allKeywords.length === 0) {
    listEl.appendChild(el('p', { style: { color:'#999', fontSize:'14px' }, textContent: '등록된 글감이 없습니다.' }));
    return;
  }
  allKeywords.forEach(kw => {
    const card = el('div', { className: 'kw-manage-card' });
    const info = el('div');
    info.appendChild(el('div', { style: { fontWeight:'700', fontSize:'15px' }, textContent: kw.text }));
    info.appendChild(el('div', { className: 'kw-date', textContent: kw.date }));
    card.appendChild(info);

    const btns = el('div', { className: 'kw-manage-btns' });
    const editBtn = el('button', { className: 'kw-btn', textContent: '수정' });
    editBtn.addEventListener('click', () => {
      const newText = prompt('글감 수정:', kw.text);
      if (!newText?.trim()) return;
      const newDate = prompt('날짜 수정 (YYYY-MM-DD):', kw.date);
      if (!newDate) return;
      updateDoc(doc(db, 'keywords', kw.id), { text: newText.trim(), date: newDate.trim() })
        .then(() => renderKeywordList())
        .catch(() => alert('수정 실패. 다시 시도해주세요.'));
    });
    const delBtn = el('button', { className: 'kw-btn del', textContent: '삭제' });
    delBtn.addEventListener('click', async () => {
      if (!confirm(`"${kw.text}" 글감을 삭제할까요?`)) return;
      try { await deleteDoc(doc(db, 'keywords', kw.id)); renderKeywordList(); }
      catch { alert('삭제 실패. 다시 시도해주세요.'); }
    });
    btns.appendChild(editBtn);
    btns.appendChild(delBtn);
    card.appendChild(btns);
    listEl.appendChild(card);
  });
}

document.getElementById('saveKwBtn').addEventListener('click', async () => {
  const text = document.getElementById('newKw').value.trim();
  const date = document.getElementById('kwDate').value;
  if (!text || !date) { alert('글감과 날짜를 모두 입력해주세요.'); return; }
  const btn = document.getElementById('saveKwBtn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    await addDoc(collection(db, 'keywords'), { text, date });
    document.getElementById('newKw').value  = '';
    document.getElementById('kwDate').value = '';
    renderKeywordList();
  } catch {
    alert('저장 실패. 다시 시도해주세요.');
  } finally {
    btn.disabled = false; btn.textContent = '저장하기';
  }
});
</script>
