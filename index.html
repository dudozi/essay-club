<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>에세이 클럽</title>
<style>
  :root { --main: #111; --bg: #FFF; }
  body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--main); overflow: hidden; height: 100vh; position: fixed; width: 100%; }
  * { box-sizing: border-box; }
  .app { max-width: 420px; margin: auto; height: 100vh; display: flex; flex-direction: column; position: relative; border-left: 1px solid #EEE; border-right: 1px solid #EEE; }
  .content { padding: 0 24px 100px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .hidden { display: none !important; }

  /* 디자인 요소 */
  .welcome-section { padding: 40px 0 20px; border-bottom: 2px solid var(--main); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
  .welcome-msg { font-size: 24px; font-weight: 400; line-height: 1.4; margin: 0; }
  .welcome-msg b { font-weight: 700; text-decoration: underline; }
  .keyword-card { border: 2.5px solid var(--main); border-radius: 24px; padding: 30px; margin-bottom: 35px; box-shadow: 8px 8px 0px var(--main); }
  .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .status-item { border: 2px solid var(--main); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 10px; }
  
  /* 하단 탭 바 */
  .tab-nav { display: flex; background: #FFF; border-top: 2px solid var(--main); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); position: absolute; bottom: 0; width: 100%; gap: 8px; z-index: 1000; }
  .tab-btn { flex: 1; border: 2px solid var(--main); padding: 12px; background: #FFF; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; }
  .tab-btn.active { background: var(--main); color: #FFF; }

  /* 로그인/회원가입 모달 */
  .modal-overlay { position: fixed; inset: 0; background: #FFF; display: flex; align-items: center; justify-content: center; z-index: 2000; }
  .modal { padding: 40px 24px; width: 100%; max-width: 420px; text-align: center; }
  input { width: 100%; padding: 18px; border: 2px solid var(--main); border-radius: 16px; margin: 10px 0; font-size: 16px; outline: none; }
  .btn-next { width: 100%; padding: 20px; background: var(--main); color: #FFF; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; }
</style>
</head>
<body>

<div class="app">
  <div id="mainUI" class="hidden" style="height:100%; display:flex; flex-direction:column;">
    <div class="header" style="padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;">
      <h1 style="font-size: 20px; font-weight: 800; text-decoration: underline;">에세이 클럽</h1>
      <div id="myCircle" style="width:34px; height:34px; border-radius:50%; background:var(--main); color:#FFF; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer;" onclick="toggleModal('editProfileModal', true)">?</div>
    </div>

    <div class="content" id="tab-today">
      <div class="welcome-section">
        <h2 class="welcome-msg" id="dynamicWelcome">...</h2>
        <img src="mole.png" alt="" style="width:80px;" onerror="this.style.display='none'">
      </div>
      <div class="keyword-card">
        <small style="font-weight:800;">오늘의 글감</small>
        <h2 id="dispKeyword" style="margin:12px 0 0; font-size:24px; font-weight:800;">...</h2>
      </div>
      <div id="statusList" class="status-grid"></div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('today')">오늘</button>
      <button class="tab-btn" onclick="switchTab('write')">쓰기</button>
      <button class="tab-btn" onclick="switchTab('feed')">피드</button>
      <button class="tab-btn" onclick="switchTab('member')">멤버</button>
    </div>
  </div>

  <div id="authModal" class="modal-overlay">
    <div class="modal">
      <h2 style="font-size:28px; font-weight:800; margin-bottom:10px;">Essay Club</h2>
      <p style="color:#666; margin-bottom:30px;">당신의 문장이 시작되는 곳</p>
      
      <div id="authStep1">
        <input id="phoneInput" type="tel" placeholder="휴대폰 번호 (- 제외)">
        <button onclick="checkUser()" class="btn-next" style="margin-top:10px;">시작하기</button>
      </div>

      <div id="authStep2" class="hidden">
        <p style="font-weight:bold; margin-bottom:10px;">클럽에서 사용할 이름을 알려주세요.</p>
        <input id="nickInput" placeholder="닉네임 입력">
        <button onclick="finishJoin()" class="btn-next" style="margin-top:10px;">클럽 입장</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, limit, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNtJ_BkroRRyq2d2dFLDb4gjumzRX85mk",
  authDomain: "essay-club.firebaseapp.com",
  projectId: "essay-club",
  storageBucket: "essay-club.firebasestorage.app",
  messagingSenderId: "282430977646",
  appId: "1:282430977646:web:8a1139948bb7f1b286587f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let myId = localStorage.getItem("essay_uid");

// 1. 첫 방문자 확인
if(myId) {
    document.getElementById('authModal').classList.add('hidden');
    document.getElementById('mainUI').classList.remove('hidden');
    startApp(myId);
}

// 2. 가입 프로세스: 번호 체크
window.checkUser = async () => {
    const phone = document.getElementById('phoneInput').value.trim();
    if(phone.length < 10) return alert("번호를 정확히 입력해주세요.");
    
    myId = phone; // 번호를 ID로 사용
    const userDoc = await getDoc(doc(db, "profiles", myId));
    
    if(userDoc.exists()) {
        // 기존 유저면 바로 입장
        completeLogin(myId);
    } else {
        // 신규 유저는 닉네임 단계로
        document.getElementById('authStep1').classList.add('hidden');
        document.getElementById('authStep2').classList.remove('hidden');
    }
};

// 3. 가입 프로세스: 닉네임 저장 및 완료
window.finishJoin = async () => {
    const nick = document.getElementById('nickInput').value.trim();
    if(!nick) return alert("닉네임을 입력해주세요.");
    
    await setDoc(doc(db, "profiles", myId), { nickname: nick, joinedAt: new Date() });
    completeLogin(myId);
};

function completeLogin(id) {
    localStorage.setItem("essay_uid", id);
    document.getElementById('authModal').classList.add('hidden');
    document.getElementById('mainUI').classList.remove('hidden');
    startApp(id);
}

function startApp(uid) {
    onSnapshot(collection(db, "profiles"), (pSnap) => {
        const userMap = {};
        pSnap.forEach(d => userMap[d.id] = d.data().nickname);
        
        onSnapshot(collection(db, "posts"), (postSnap) => {
            const today = new Date().toLocaleDateString();
            const doneIds = new Set();
            postSnap.forEach(s => {
                if(s.data().createdAt && new Date(s.data().createdAt.toDate()).toLocaleDateString() === today) doneIds.add(s.data().uid);
            });

            const myName = userMap[uid] || "멤버";
            const isDone = doneIds.has(uid);
            document.getElementById('dynamicWelcome').innerHTML = isDone 
                ? `<b>${myName}</b>님,<br>이야기 남겨줘서 고마워요.` 
                : `<b>${myName}</b>님,<br>오늘의 생각을 붙잡아 보세요!`;
            document.getElementById('myCircle').textContent = myName[0];

            const listEl = document.getElementById('statusList');
            listEl.innerHTML = "";
            Object.entries(userMap).forEach(([id, name]) => {
                if(id === "master_admin") return;
                const done = doneIds.has(id);
                listEl.innerHTML += `<div class="status-item"><div style="width:30px;height:30px;border-radius:50%;background:#111;color:#FFF;display:flex;align-items:center;justify-content:center;font-size:12px;">${name[0]}</div><div><b style="font-size:14px;">${name}</b><br><span class="badge ${done?'active':''}" style="font-size:10px; border:1px solid #111; padding:2px 6px; border-radius:6px; background:${done?'#111':'#FFF'}; color:${done?'#FFF':'#111'};">${done?'완료':'미완'}</span></div></div>`;
            });
        });
    });

    onSnapshot(query(collection(db, "keywords"), orderBy("date", "desc"), limit(1)), (snap) => {
        snap.forEach(d => document.getElementById('dispKeyword').textContent = d.data().text);
    });
}
</script>
</body>
</html>
